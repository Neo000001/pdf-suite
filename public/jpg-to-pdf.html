<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPG to PDF - PDFSuite</title>

    <link rel="stylesheet" href="../src/css/base.css" />
    <link rel="stylesheet" href="../src/css/dashboard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        .workspace {
            max-width: 800px;
            margin: 3rem auto;
            padding: 2rem;
            background: var(--bg-soft);
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
            text-align: center;
        }

        .upload-box {
            border: 2px dashed #3b82f6;
            padding: 3rem;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 2rem;
            background: rgba(59, 130, 246, 0.05);
        }

        .btn-large {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            width: 100%;
            font-weight: 600;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .gallery img {
            height: 120px;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
            object-fit: cover;
        }
    </style>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>

<body>

    <header class="site-header">
        <div class="header-inner">
            <a href="../index.html" class="logo">PDF<span>Suite</span></a>
            <div class="header-actions"><a href="../index.html" class="btn-ghost btn-small">Back to Tools</a></div>
        </div>
    </header>

    <div class="ad-banner-section">
        <div class="ad-placeholder"><span>Google Ads - 728x90 Top placement</span></div>
    </div>

    <div class="workspace">
        <h1>Convert JPG to PDF</h1>
        <p>Turn images into a single PDF document perfectly in seconds.</p>

        <div class="upload-box" id="uploadBox">
            <h2>🖼️ Drag & Drop Images</h2>
            <p style="color:var(--fg-muted)">Supports JPG and PNG formats</p>
            <input type="file" id="fileInput" accept="image/jpeg, image/png" multiple hidden>
        </div>

        <div id="actionArea" style="display: none;">
            <div class="gallery" id="imageGallery"></div>
            <button class="btn-primary btn-large" id="convertBtn">Convert to PDF</button>
            <p id="statusMsg" style="margin-top: 1rem; color: #22c55e;"></p>
        </div>
    </div>

    <div class="ad-banner-section bottom-ad">
        <div class="ad-placeholder square"><span>Google Ads - 300x250</span></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const actionArea = document.getElementById('actionArea');
        const gallery = document.getElementById('imageGallery');
        const convertBtn = document.getElementById('convertBtn');
        const statusMsg = document.getElementById('statusMsg');

        let imageFiles = [];

        uploadBox.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                imageFiles = [...imageFiles, ...files];
                uploadBox.style.display = 'none';
                actionArea.style.display = 'block';

                gallery.innerHTML = '';
                for (let f of imageFiles) {
                    const url = URL.createObjectURL(f);
                    const img = document.createElement('img');
                    img.src = url;
                    gallery.appendChild(img);
                }
            }
        });

        convertBtn.addEventListener('click', async () => {
            try {
                convertBtn.disabled = true;
                convertBtn.innerText = "Processing...";

                const { PDFDocument } = PDFLib;
                const newPdf = await PDFDocument.create();

                for (const imgFile of imageFiles) {
                    const imgBytes = await imgFile.arrayBuffer();
                    let pdfImage;

                    if (imgFile.type === 'image/jpeg') {
                        pdfImage = await newPdf.embedJpg(imgBytes);
                    } else if (imgFile.type === 'image/png') {
                        pdfImage = await newPdf.embedPng(imgBytes);
                    }

                    if (pdfImage) {
                        const { width, height } = pdfImage.scale(1);
                        const page = newPdf.addPage([width, height]);
                        page.drawImage(pdfImage, { x: 0, y: 0, width, height });
                    }
                }

                const newPdfBytes = await newPdf.save();
                const blob = new Blob([newPdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Images_${new Date().getTime()}.pdf`;
                link.click();

                statusMsg.innerText = "Success! Images converted and downloaded.";
                convertBtn.innerText = "Convert Images to PDF";
                convertBtn.disabled = false;

            } catch (err) {
                console.error(err);
                alert("Failed to convert image. See console.");
                convertBtn.disabled = false;
                convertBtn.innerText = "Convert to PDF";
            }
        });
    </script>
</body>

</html>
