    <div class="workspace">
        <h1>OCR Text Extraction</h1>
        <p>Use Tesseract.js AI inside your browser to extract text from images and scanned documents.</p>
        <div class="upload-box" id="uploadBox">
            <h2>Select Scanned Image (JPG/PNG)</h2>
            <input type="file" id="fileInput" accept="image/jpeg, image/png" hidden>
        </div>
        <div id="actionArea" style="display: none;">
            <p id="fileInfo" style="margin-bottom: 1.5rem; font-weight: 600; text-align: left;"></p>

            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <p id="statusMsg" style="margin-top: 1rem; color: #f59e0b; font-size: 0.8rem;"></p>

            <textarea id="output-text" placeholder="Extracted text will appear here..."></textarea>
            <button class="btn-primary btn-large" id="processBtn">Start OCR Extraction</button>
        </div>
    </div>

    <div class="ad-banner-section bottom-ad">
        
    <div class="ad-container" style="text-align: center; margin: 1rem 0;">
      <ins class="adsbygoogle"
           style="display:inline-block;width:300px;height:250px"
           data-ad-client="ca-pub-7048088905906211"></ins>
      <script>
           (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const actionArea = document.getElementById('actionArea');
        const processBtn = document.getElementById('processBtn');
        const statusMsg = document.getElementById('statusMsg');
        const outputText = document.getElementById('output-text');
        const fileInfo = document.getElementById('fileInfo');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');

        let objectUrl = null;

        uploadBox.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                objectUrl = URL.createObjectURL(file);
                uploadBox.style.display = 'none';
                actionArea.style.display = 'block';
                fileInfo.innerText = `Source: ${file.name}`;
            }
        });

        processBtn.addEventListener('click', async () => {
            if (!objectUrl) return;
            processBtn.disabled = true;
            progressBar.style.display = 'block';
            outputText.value = '';

            try {
                const worker = await Tesseract.createWorker("eng", 1, {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            progressFill.style.width = Math.max(0, parseInt(m.progress * 100)) + '%';
                            statusMsg.innerText = `Recognizing text... ${Math.max(0, parseInt(m.progress * 100))}%`;
                        } else {
                            statusMsg.innerText = m.status;
                        }
                    }
                });

                const { data: { text } } = await worker.recognize(objectUrl);
                outputText.value = text;
                statusMsg.innerText = "Text successfully extracted from image!";
                statusMsg.style.color = '#22c55e';

                await worker.terminate();
            } catch (err) {
                console.error(err);
                statusMsg.innerText = "OCR Failed.";
                statusMsg.style.color = "#ef4444";
            } finally {
                processBtn.disabled = false;
                processBtn.innerText = "Run Again";
            }
        });
    </script>
    <script src="../src/js/protect.js"></script>
