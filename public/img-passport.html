<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Passport Size Photo | PDFSuite</title>
    <link rel="stylesheet" href="../src/css/base.css" />
    <link rel="stylesheet" href="../src/css/dashboard.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        .workspace {
            max-width: 860px;
            margin: 3rem auto;
            padding: 2rem;
            background: var(--bg-soft);
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
        }

        .upload-zone {
            border: 2px dashed #6366f1;
            border-radius: 14px;
            padding: 4rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-zone:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .result-section {
            display: none;
        }

        .editor-container {
            background: var(--bg);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
        }

        .img-wrapper {
            max-height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
        }

        .img-wrapper img {
            max-height: 500px;
            max-width: 100%;
            display: block;
        }

        .btn-crop {
            width: 100%;
            padding: 1rem;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.05rem;
        }

        select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-soft);
            color: var(--fg);
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="../index.html" class="logo">PDF<span>Suite</span></a>
            <div class="header-actions"><a href="./image-tools.html" class="btn-ghost btn-small">Image Tools</a></div>
        </div>
    </header>
    <div class="workspace">
        <a href="./image-tools.html"
            style="color:var(--accent); text-decoration:none; display:inline-block; margin-bottom:1rem; font-size:0.9rem;">&larr;
            Back to Image Tools</a>
        <h1>Passport Size Photo Maker</h1>
        <p style="color:var(--fg-muted)">Crop your photo to perfect standardized passport margins instantly.</p>

        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileIn').click()">
            <i data-lucide="user" style="width:48px;height:48px;color:#6366f1;margin:0 auto 1rem;"></i>
            <h3>Select Image</h3>
            <input type="file" id="fileIn" accept="image/*" hidden>
        </div>

        <div class="result-section" id="resultSec">
            <div class="editor-container">
                <select id="sizePresets">
                    <option value="1">US Passport (2x2 inch)</option>
                    <option value="0.77777">EU/UK/IN Passport (3.5x4.5 cm)</option>
                    <option value="0.8">Visa Standard (4x5 cm)</option>
                </select>
                <div class="img-wrapper">
                    <img id="imageToCrop">
                </div>
            </div>
            <button class="btn-crop" id="downloadBtn">Crop & Download</button>
        </div>
    </div>
    <script>
        lucide.createIcons();
        let cropper = null;
        const fileIn = document.getElementById('fileIn');
        let fileType = 'image/jpeg';
        let fileName = 'passport';

        fileIn.addEventListener('change', e => {
            const f = e.target.files[0];
            if (!f) return;
            fileName = f.name.replace(/\.[^.]+$/, '');
            fileType = f.type === 'image/png' ? 'image/png' : 'image/jpeg';

            document.getElementById('uploadZone').style.display = 'none';
            document.getElementById('resultSec').style.display = 'block';

            const img = document.getElementById('imageToCrop');
            img.src = URL.createObjectURL(f);

            img.onload = () => {
                if (cropper) cropper.destroy();
                cropper = new Cropper(img, {
                    aspectRatio: parseFloat(document.getElementById('sizePresets').value),
                    viewMode: 1,
                    guides: true,
                    autoCropArea: 0.8
                });
            };
        });

        document.getElementById('sizePresets').addEventListener('change', e => {
            if (cropper) cropper.setAspectRatio(parseFloat(e.target.value));
        });

        document.getElementById('downloadBtn').onclick = () => {
            if (!cropper) return;
            // Generate standard passport layout dimension at 300 DPI (approx 600x600 for US)
            const canvas = cropper.getCroppedCanvas({ imageSmoothingEnabled: true, imageSmoothingQuality: 'high' });
            canvas.toBlob(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `passport_${fileName}.${fileType === 'image/png' ? 'png' : 'jpg'}`;
                a.click();
            }, fileType, 1.0);
        };
    </script>
    <script src="../src/js/protect.js"></script>
    <script src="../src/js/adblock-detect.js" defer></script>
</body>

</html>
