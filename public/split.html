<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visually Split PDF - PDFSuite</title>

    <link rel="stylesheet" href="../src/css/base.css" />
    <link rel="stylesheet" href="../src/css/dashboard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        .workspace {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 1.5rem;
            background: var(--bg);
            border: none;
            text-align: center;
        }

        .upload-box {
            border: 2px dashed #06b6d4;
            padding: 4rem;
            cursor: pointer;
            border-radius: 12px;
            margin: 2rem auto;
            background: rgba(6, 182, 212, 0.05);
            max-width: 700px;
        }

        .sticky-toolbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg-soft);
            border-bottom: 1px solid var(--border-subtle);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .pages-grid {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            padding-bottom: 4rem;
        }

        .page-thumb-wrapper {
            position: relative;
            background: var(--bg-soft);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .page-thumb-wrapper:hover {
            border-color: #06b6d4;
            transform: translateY(-3px);
        }

        .page-thumb-wrapper.selected {
            border-color: #06b6d4;
            background: rgba(6, 182, 212, 0.1);
        }

        .page-thumb-wrapper.selected .extract-badge {
            display: block;
        }

        .page-canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--border-subtle);
            background: #fff;
            pointer-events: none;
        }

        .page-info {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px dashed var(--border-subtle);
        }

        .page-num {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--fg-muted);
            pointer-events: none;
        }

        .extract-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #06b6d4;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            pointer-events: none;
        }

        #actionArea {
            display: none;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>

<body>

    <header class="site-header">
        <div class="header-inner">
            <a href="../index.html" class="logo">PDF<span>Suite</span></a>
            <div class="header-actions"><a href="../index.html" class="btn-ghost btn-small">Back to Tools</a></div>
        </div>
    </header>

    <div class="workspace">
        <div class="upload-box" id="uploadBox">
            <h2 style="color: #06b6d4;">✂️ Visually Split PDF</h2>
            <p style="color:var(--fg-muted)">Upload a PDF. Click pages to select them for extraction into a new
                document.</p>
            <input type="file" id="fileInput" accept="application/pdf" hidden>
        </div>

        <div id="actionArea">
            <div class="sticky-toolbar">
                <div style="display:flex; align-items: center;">
                    <span style="font-weight:600" id="fileTitle">Document</span>
                    <span style="color:#06b6d4; margin-left:1rem; font-weight:bold; font-size:0.9rem;"
                        id="selectCountLabel">0 pages selected to extract</span>
                </div>
                <div style="display:flex; gap: 1rem; align-items:center;">
                    <span id="statusMsg" style="font-size:0.9rem; color:#22c55e;"></span>
                    <button class="btn-primary" id="saveBtn"
                        style="background:#06b6d4; pointer-events: none; opacity: 0.5;">✂️ Extract Pages</button>
                </div>
            </div>

            <div class="pages-grid" id="pagesGrid"></div>
        </div>
    </div>

    <div class="ad-banner-section bottom-ad">
        <div class="ad-placeholder square"><span>Google Ads - 300x250</span></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const actionArea = document.getElementById('actionArea');
        const pagesGrid = document.getElementById('pagesGrid');
        const fileTitle = document.getElementById('fileTitle');
        const selectCountLabel = document.getElementById('selectCountLabel');
        const saveBtn = document.getElementById('saveBtn');
        const statusMsg = document.getElementById('statusMsg');

        let originalPdfBytes = null;
        let fileName = '';
        let pagesData = []; // { originalIndex: 1, selected: false }

        uploadBox.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                fileName = file.name;
                originalPdfBytes = await file.arrayBuffer();

                uploadBox.style.display = 'none';
                actionArea.style.display = 'block';
                fileTitle.innerText = fileName;

                statusMsg.innerText = "Extracting pages...";
                await renderThumbnails();
                statusMsg.innerText = "Hold Shift to select a range!";
            }
        });

        let lastClickedIdx = -1;

        async function renderThumbnails() {
            pagesGrid.innerHTML = '';
            pagesData = [];

            const doc = await pdfjsLib.getDocument({ data: new Uint8Array(originalPdfBytes) }).promise;

            for (let i = 1; i <= doc.numPages; i++) {
                pagesData.push({ originalIndex: i, selected: false });

                const page = await doc.getPage(i);
                const viewport = page.getViewport({ scale: 0.5 });

                const wrapper = document.createElement('div');
                wrapper.className = 'page-thumb-wrapper';
                wrapper.dataset.index = i - 1;

                const overlay = document.createElement('div');
                overlay.className = 'extract-badge';
                overlay.innerText = '✓';

                const canvas = document.createElement('canvas');
                canvas.className = 'page-canvas';
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const ctx = canvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                const infoDiv = document.createElement('div');
                infoDiv.className = 'page-info';
                const numSpan = document.createElement('span');
                numSpan.className = 'page-num';
                numSpan.innerText = `Page ${i}`;
                infoDiv.appendChild(numSpan);

                wrapper.appendChild(overlay);
                wrapper.appendChild(canvas);
                wrapper.appendChild(infoDiv);

                // Shift + Click Range Select Logic
                wrapper.addEventListener('click', function (e) {
                    let idx = parseInt(this.dataset.index);

                    if (e.shiftKey && lastClickedIdx !== -1) {
                        // Select range
                        let start = Math.min(lastClickedIdx, idx);
                        let end = Math.max(lastClickedIdx, idx);
                        for (let k = start; k <= end; k++) {
                            pagesData[k].selected = true;
                            pagesGrid.children[k].classList.add('selected');
                        }
                    } else {
                        pagesData[idx].selected = !pagesData[idx].selected;
                        this.classList.toggle('selected');
                    }

                    lastClickedIdx = idx;
                    updateCount();
                });

                pagesGrid.appendChild(wrapper);
            }
        }

        function updateCount() {
            const selectCount = pagesData.filter(p => p.selected).length;
            selectCountLabel.innerText = `${selectCount} pages selected format extraction`;

            if (selectCount > 0) {
                saveBtn.style.pointerEvents = 'auto';
                saveBtn.style.opacity = '1';
            } else {
                saveBtn.style.pointerEvents = 'none';
                saveBtn.style.opacity = '0.5';
            }
        }

        saveBtn.addEventListener('click', async () => {
            try {
                const pagesToExtract = pagesData.filter(p => p.selected);
                if (pagesToExtract.length === 0) return;

                saveBtn.disabled = true;
                saveBtn.innerText = "Processing...";
                statusMsg.innerText = "Building Extracted PDF...";

                const { PDFDocument } = PDFLib;
                const sourceDoc = await PDFDocument.load(originalPdfBytes);
                const newPdf = await PDFDocument.create();

                const indicesToKeep = pagesToExtract.map(p => p.originalIndex - 1);
                const copiedPagesArr = await newPdf.copyPages(sourceDoc, indicesToKeep);
                copiedPagesArr.forEach(page => newPdf.addPage(page));

                const newPdfBytes = await newPdf.save();
                const blob = new Blob([newPdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Extracted_${fileName}`;
                link.click();

                statusMsg.innerText = "Extracted document saved!";
                saveBtn.innerText = "✂️ Extract Pages";
                saveBtn.disabled = false;
            } catch (err) {
                console.error(err);
                alert("Failed to build document. See console.");
                saveBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
