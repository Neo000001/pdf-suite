<html lang="en" data-theme="dark">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit PDF - PDFSuite</title>
    <meta name="description"
        content="Edit your PDF files directly in the browser. Add text, draw, highlight, and more.">

    <link rel="stylesheet" href="../src/css/base.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7048088905906211"
        crossorigin="anonymous"></script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* === TOP HEADER === */
        .editor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            height: 52px;
            background: var(--bg-soft);
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
            gap: 1rem;
        }

        .editor-logo {
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            color: var(--fg);
            white-space: nowrap;
        }

        .editor-logo span {
            color: var(--accent);
        }

        .page-nav {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--fg-muted);
        }

        .page-nav button {
            background: none;
            border: 1px solid var(--border-subtle);
            color: var(--fg);
            border-radius: 6px;
            padding: 3px 9px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .page-nav button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .page-nav button:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .btn-export {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 7px 18px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .btn-export:hover {
            background: #1d4ed8;
        }

        .btn-export:disabled {
            opacity: 0.5;
            cursor: default;
        }

        /* === TOOLBAR === */
        .editor-toolbar {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 0 0.75rem;
            height: 48px;
            background: var(--bg-soft);
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .editor-toolbar::-webkit-scrollbar {
            display: none;
        }

        .toolbar-sep {
            width: 1px;
            height: 24px;
            background: var(--border-subtle);
            margin: 0 6px;
            flex-shrink: 0;
        }

        .tool-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 10px;
            border-radius: 7px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--fg-muted);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tool-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .tool-btn:hover {
            background: rgba(96, 165, 250, 0.08);
            color: var(--fg);
            border-color: var(--border-subtle);
        }

        .tool-btn.active {
            background: rgba(37, 99, 235, 0.15);
            color: #60a5fa;
            border-color: rgba(37, 99, 235, 0.4);
        }

        .color-pick {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border-subtle);
            cursor: pointer;
            padding: 0;
        }

        .font-size-input {
            width: 48px;
            padding: 4px 6px;
            border-radius: 6px;
            border: 1px solid var(--border-subtle);
            background: var(--bg);
            color: var(--fg);
            font-size: 0.82rem;
            text-align: center;
        }

        label.toolbar-label {
            font-size: 0.78rem;
            color: var(--fg-muted);
            white-space: nowrap;
        }

        /* === EDITOR BODY === */
        .editor-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* === CANVAS AREA === */
        .canvas-area {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem;
            background: #1a1a2e;
        }

        html[data-theme="light"] .canvas-area {
            background: #e2e8f0;
        }

        .pdf-wrap {
            position: relative;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            background: #fff;
            display: inline-block;
        }

        #pdfCanvas {
            display: block;
        }

        /* Annotation overlay */
        #annotationLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #annotationLayer.tool-text {
            pointer-events: auto;
            cursor: text;
        }

        #annotationLayer.tool-draw {
            pointer-events: auto;
            cursor: crosshair;
        }

        #annotationLayer.tool-highlight {
            pointer-events: auto;
            cursor: text;
        }

        #annotationLayer.tool-sign {
            pointer-events: auto;
            cursor: crosshair;
        }

        /* Text boxes */
        .anno-text {
            position: absolute;
            pointer-events: auto;
            background: transparent;
            border: 1px dashed rgba(37, 99, 235, 0.6);
            min-width: 40px;
            min-height: 20px;
            outline: none;
            font-family: inherit;
            cursor: move;
            user-select: none;
            -webkit-user-drag: none;
        }

        .anno-text:hover {
            border-style: solid;
        }

        .anno-text .copy-all-handle,
        .anno-text .delete-handle {
            position: absolute;
            top: -10px;
            right: -10px;
        }
        .anno-text .copy-all-handle {
            right: auto;
            left: -10px;
            background: #3b82f6;
        }
        .anno-text .delete-handle {
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            cursor: pointer;
            font-style: normal;
            line-height: 1;
        }

        .anno-text:hover .copy-all-handle,
        .anno-text:hover .delete-handle {
            display: flex;
        }

        /* Highlight overlays */
        .anno-highlight {
            position: absolute;
            pointer-events: auto;
            cursor: move;
        }

        .anno-highlight .delete-handle {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: pointer;
        }

        .anno-highlight:hover .delete-handle {
            display: flex;
        }

        /* Draw canvas */
        #drawCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        /* === UPLOAD STATE === */
        #uploadState {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 4rem 2rem;
            border: 2px dashed var(--border-subtle);
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            max-width: 500px;
            width: 100%;
        }

        #uploadState:hover {
            border-color: var(--accent);
            background: rgba(96, 165, 250, 0.04);
        }

        #uploadState svg {
            width: 48px;
            height: 48px;
            color: var(--accent);
        }

        #uploadState h2 {
            font-size: 1.2rem;
        }

        #uploadState p {
            color: var(--fg-muted);
            font-size: 0.9rem;
        }

        .canvas-area.editing #uploadState {
            display: none;
        }

        .pdf-wrap {
            display: none;
        }

        .canvas-area.editing .pdf-wrap {
            display: inline-block;
        }

        /* === SIGNATURE PAD MODAL === */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal {
            background: var(--bg-soft);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 1.5rem;
            width: 480px;
            max-width: 95vw;
        }

        .modal h3 {
            margin-bottom: 1rem;
        }

        .sig-canvas {
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            background: #fff;
            width: 100%;
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            justify-content: flex-end;
            align-items: center;
        }

        .all-pages-lbl {
            margin-right: auto;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--fg);
        }

        .btn-modal-sec {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--fg);
            border-radius: 8px;
            padding: 7px 16px;
            cursor: pointer;
        }

        .btn-modal-pri {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px 16px;
            cursor: pointer;
            font-weight: 600;
        }

        /* === SIDEBAR PAGE THUMBS (optional, hidden mobile) === */
        .thumb-sidebar {
            width: 140px;
            background: var(--bg-soft);
            border-right: 1px solid var(--border-subtle);
            overflow-y: auto;
            padding: 0.75rem 0.5rem;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .thumb-item {
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            padding: 4px;
            transition: all 0.15s;
        }

        .thumb-item.active {
            border-color: #2563eb;
        }

        .thumb-item:hover {
            border-color: var(--accent);
        }

        .thumb-item canvas {
            width: 100%;
            height: auto;
            display: block;
            background: #fff;
            border-radius: 2px;
        }

        .thumb-item p {
            font-size: 0.7rem;
            color: var(--fg-muted);
            margin-top: 3px;
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .thumb-sidebar {
                display: none;
            }

            .canvas-area {
                padding: 0.75rem;
            }

            .editor-toolbar {
                height: auto;
                min-height: 48px;
                flex-wrap: wrap;
                padding: 6px;
                gap: 4px;
            }

            .tool-btn {
                padding: 5px 8px;
                font-size: 0.78rem;
            }

            body {
                overflow: auto;
            }

            .editor-body {
                overflow: auto;
            }
        }
    </style>

    <!-- Auto Theme Detector -->
    <script>
        (function () {
            const savedTheme = localStorage.getItem('pdfsuite-theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else {
                const hour = new Date().getHours();
                const theme = (hour >= 6 && hour < 18) ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();
    </script>
</head>

<body>

    <!-- TOP HEADER -->
    <header class="editor-header">
        <a href="../index.html" class="editor-logo">PDF<span>Suite</span></a>

        <div class="page-nav" id="pageNav" style="display:none">
            <button id="prevPage"><i data-lucide="chevron-left" style="width:14px;height:14px"></i></button>
            <span id="pageInfo">1 / 1</span>
            <button id="nextPage"><i data-lucide="chevron-right" style="width:14px;height:14px"></i></button>
        </div>

        <div class="header-actions">
            <button class="btn-export" id="exportBtn" disabled>Export PDF</button>
        </div>
    </header>

    <!-- TOOLBAR -->
    <div class="editor-toolbar" id="editorToolbar" style="display:none">

        <!-- TOOL MODES -->
        <button class="tool-btn active" data-tool="select" title="Select / Move">
            <i data-lucide="mouse-pointer"></i> Select
        </button>
        <button class="tool-btn" data-tool="text" title="Add Text">
            <i data-lucide="type"></i> Text
        </button>
        <button class="tool-btn" data-tool="draw" title="Freehand Draw">
            <i data-lucide="pencil"></i> Draw
        </button>
        <button class="tool-btn" data-tool="highlight" title="Highlight Box">
            <i data-lucide="highlighter"></i> Highlight
        </button>
        <button class="tool-btn" data-tool="sign" title="Add Signature">
            <i data-lucide="pen-tool"></i> Sign
        </button>

        <div class="toolbar-sep"></div>

        <!-- TEXT OPTIONS -->
        <label class="toolbar-label">Size:</label>
        <input type="number" class="font-size-input" id="fontSize" value="16" min="8" max="96">

        <label class="toolbar-label">Color:</label>
        <input type="color" class="color-pick" id="textColor" value="#000000" title="Text Color">

        <div class="toolbar-sep"></div>

        <!-- DRAW OPTIONS -->
        <label class="toolbar-label">Stroke:</label>
        <input type="color" class="color-pick" id="drawColor" value="#ef4444" title="Draw Color">
        <input type="range" id="drawSize" min="1" max="20" value="3" style="width:70px" title="Stroke Size">

        <div class="toolbar-sep"></div>

        <!-- HIGHLIGHT OPTIONS -->
        <label class="toolbar-label">Highlight:</label>
        <input type="color" class="color-pick" id="hlColor" value="#facc15" title="Highlight Color">

        <div class="toolbar-sep"></div>

        <!-- ZOOM -->
        <button class="tool-btn" id="zoomOut" title="Zoom Out"><i data-lucide="zoom-out"></i></button>
        <label class="toolbar-label" id="zoomLabel">100%</label>
        <button class="tool-btn" id="zoomIn" title="Zoom In"><i data-lucide="zoom-in"></i></button>

        <div class="toolbar-sep"></div>

        <button class="tool-btn" id="undoBtn" title="Undo"><i data-lucide="undo-2"></i></button>
        <button class="tool-btn" id="clearPageBtn" title="Clear All on Page"><i data-lucide="trash-2"></i></button>
    </div>

    <!-- EDITOR BODY -->
    <div class="editor-body">

        <!-- PAGE THUMBNAILS SIDEBAR -->
        <div class="thumb-sidebar" id="thumbSidebar"></div>

        <!-- CANVAS AREA -->
        <div class="canvas-area" id="canvasArea">
            <div id="uploadState">
                <input type="file" id="fileInput" accept="application/pdf" hidden>
                <i data-lucide="file-up"></i>
                <h2>Open a PDF to Edit</h2>
                <p>Click here or drop a PDF file to get started</p>
            </div>

            <div class="pdf-wrap" id="pdfWrap">
                <canvas id="pdfCanvas"></canvas>
                <canvas id="drawCanvas"></canvas>
                <div id="annotationLayer"></div>
            </div>
        </div>
    </div>

    <!-- SIGNATURE MODAL -->
    <div class="modal-backdrop" id="sigModal">
        <div class="modal" style="width:520px; max-height:90vh; overflow-y:auto;">
            <h3 style="margin-bottom:0.75rem;">Add Signature</h3>

            <!-- Tabs -->
            <div
                style="display:flex; gap:0; border:1px solid var(--border-subtle); border-radius:10px; overflow:hidden; margin-bottom:1.25rem;">
                <button class="sig-tab active" id="tabDraw" onclick="switchSigTab('draw')"
                    style="flex:1; padding:0.6rem; background:var(--accent); color:#fff; border:none; cursor:pointer; font-size:0.85rem; font-weight:600;">Draw</button>
                <button class="sig-tab" id="tabType" onclick="switchSigTab('type')"
                    style="flex:1; padding:0.6rem; background:transparent; color:var(--fg); border:none; cursor:pointer; font-size:0.85rem; font-weight:600; border-left:1px solid var(--border-subtle);">Type</button>
                <button class="sig-tab" id="tabUpload" onclick="switchSigTab('upload')"
                    style="flex:1; padding:0.6rem; background:transparent; color:var(--fg); border:none; cursor:pointer; font-size:0.85rem; font-weight:600; border-left:1px solid var(--border-subtle);">Upload
                    Image</button>
            </div>

            <!-- Draw Tab -->
            <div id="sigPaneDraw">
                <canvas class="sig-canvas" id="sigCanvas" width="432" height="180"></canvas>
            </div>

            <!-- Type Tab -->
            <div id="sigPaneType" style="display:none;">
                <input id="sigTypeInput" type="text" placeholder="Type your name here..."
                    style="width:100%; box-sizing:border-box; padding:0.8rem 1rem; border:1px solid var(--border-subtle); border-radius:8px; font-size:1rem; background:var(--bg); color:var(--fg); margin-bottom:0.75rem;">
                <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.75rem;">
                    <label style="font-size:0.8rem; color:var(--fg-muted); align-self:center;">Style:</label>
                    <button onclick="setSigFont('Dancing Script')"
                        style="font-family:'Dancing Script',cursive; padding:4px 12px; border:1px solid var(--border-subtle); border-radius:6px; background:var(--bg); color:var(--fg); cursor:pointer; font-size:1rem;">Cursive</button>
                    <button onclick="setSigFont('serif')"
                        style="font-family:serif; padding:4px 12px; border:1px solid var(--border-subtle); border-radius:6px; background:var(--bg); color:var(--fg); cursor:pointer; font-size:1rem;">Serif</button>
                    <button onclick="setSigFont('Arial')"
                        style="font-family:Arial; padding:4px 12px; border:1px solid var(--border-subtle); border-radius:6px; background:var(--bg); color:var(--fg); cursor:pointer; font-size:1rem;">Print</button>
                </div>
                <canvas id="sigTypePreview" width="432" height="120"
                    style="width:100%; background:#fff; border:1px solid var(--border-subtle); border-radius:8px; display:block;"></canvas>
            </div>

            <!-- Upload Tab -->
            <div id="sigPaneUpload" style="display:none;">
                <div id="sigUploadBox"
                    style="border:2px dashed var(--border-subtle); border-radius:10px; padding:2rem; text-align:center; cursor:pointer; margin-bottom:0.75rem; transition:border-color 0.2s;"
                    onclick="document.getElementById('sigFileInput').click()"
                    onmouseover="this.style.borderColor='var(--accent)'"
                    onmouseout="this.style.borderColor='var(--border-subtle)'">
                    <p style="margin:0 0 0.4rem 0; font-weight:600; color:var(--fg);">Click to upload signature image
                    </p>
                    <p style="margin:0; font-size:0.82rem; color:var(--fg-muted);">PNG, JPG, WebP supported</p>
                    <input type="file" id="sigFileInput" accept="image/*" hidden>
                </div>
                <div id="sigUploadControls" style="display:none;">
                    <canvas id="sigUploadPreview" width="432" height="150"
                        style="width:100%; background:transparent; border:1px solid var(--border-subtle); border-radius:8px; display:block; background-color: #e5e5f7; background-image: repeating-linear-gradient(45deg, #c5c5db 25%, transparent 25%, transparent 75%, #c5c5db 75%, #c5c5db), repeating-linear-gradient(45deg, #c5c5db 25%, #e5e5f7 25%, #e5e5f7 75%, #c5c5db 75%, #c5c5db); background-position: 0 0, 10px 10px; background-size: 20px 20px;"></canvas>

                    <label
                        style="display:flex;font-size:0.85rem;color:var(--fg);margin-top:0.75rem;align-items:center;gap:0.5rem;cursor:pointer;font-weight:600;">
                        <input type="checkbox" id="sigRemoveBg" checked> Remove Background (Make Transparent)
                    </label>

                    <div id="sigRemoveBgOptions"
                        style="margin-top:0.5rem; padding-left:1.5rem; border-left:2px solid var(--border-subtle);">
                        <label
                            style="font-size:0.8rem; color:var(--fg-muted); display:block; margin-bottom:0.25rem;">Background
                            Removal Intensity</label>
                        <div style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem;">
                            <span style="font-size:0.75rem; color:var(--fg-muted);">Low</span>
                            <input type="range" id="sigBgTolerance" min="0" max="255" value="180"
                                style="flex:1; accent-color:#ec4899;">
                            <span style="font-size:0.75rem; color:var(--fg-muted);">High</span>
                        </div>
                        <label
                            style="display:flex;font-size:0.8rem;color:var(--fg);align-items:center;gap:0.4rem;cursor:pointer;">
                            <input type="checkbox" id="sigMakeBlack" checked> Make remaining strokes pure black
                        </label>
                    </div>
                </div>
            </div>

            <div class="modal-actions" style="margin-top:1rem;">
                <label class="all-pages-lbl">
                    <input type="checkbox" id="sigAllPages"> Apply to ALL pages
                </label>
                <button class="btn-modal-sec" id="sigUndoBtn">Undo</button>
                <button class="btn-modal-sec" id="clearSigBtn">Clear</button>
                <button class="btn-modal-sec" id="closeSigBtn">Cancel</button>
                <button class="btn-modal-pri" id="applySigBtn">Place Signature</button>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        lucide.createIcons();

        // ========== STATE ==========
        let pdfDoc = null, currentPage = 1, scale = 1.2;
        let originalPdfBytes = null;
        let currentTool = 'select';
        const annos = {}; // per-page annotation store: { textItems:[], highlightItems:[], drawData:[], signatures:[] }
        const drawHistory = {}; // draw canvas per-page image data
        let undoStack = [];
        let activeTextBox = null;

        // ========== ELEMENTS ==========
        const fileInput = document.getElementById('fileInput');
        const uploadState = document.getElementById('uploadState');
        const canvasArea = document.getElementById('canvasArea');
        const pdfWrap = document.getElementById('pdfWrap');
        const pdfCanvas = document.getElementById('pdfCanvas');
        const drawCanvas = document.getElementById('drawCanvas');
        const annotLayer = document.getElementById('annotationLayer');
        const exportBtn = document.getElementById('exportBtn');
        const pageNav = document.getElementById('pageNav');
        const editorToolbar = document.getElementById('editorToolbar');
        const pageInfo = document.getElementById('pageInfo');
        const thumbSidebar = document.getElementById('thumbSidebar');
        const sigModal = document.getElementById('sigModal');
        const sigCanvas = document.getElementById('sigCanvas');

        const pdfCtx = pdfCanvas.getContext('2d');
        const drawCtx = drawCanvas.getContext('2d');

        // ========== UPLOAD ==========
        uploadState.addEventListener('click', () => fileInput.click());
        uploadState.addEventListener('dragover', e => { e.preventDefault(); });
        uploadState.addEventListener('drop', e => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') loadPdf(file);
        });

        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) loadPdf(file);
        });

        async function loadPdf(file) {
            originalPdfBytes = await file.arrayBuffer();
            pdfDoc = await pdfjsLib.getDocument({ data: new Uint8Array(originalPdfBytes) }).promise;

            canvasArea.classList.add('editing');
            pageTo(1);
            pageNav.style.display = 'flex';
            editorToolbar.style.display = 'flex';
            exportBtn.disabled = false;
            buildThumbnails();
            lucide.createIcons();
        }

        // ========== RENDER PAGE ==========
        let renderTask = null;

        async function renderPage(num) {
            if (!pdfDoc) return;
            saveDrawing();
            clearAnnotLayer();

            const page = await pdfDoc.getPage(num);
            const vp = page.getViewport({ scale });

            pdfCanvas.width = vp.width;
            pdfCanvas.height = vp.height;
            drawCanvas.width = vp.width;
            drawCanvas.height = vp.height;
            drawCanvas.style.position = 'absolute';
            drawCanvas.style.top = 0;
            drawCanvas.style.left = 0;

            if (renderTask) renderTask.cancel();
            renderTask = page.render({ canvasContext: pdfCtx, viewport: vp });

            await renderTask.promise.catch(() => { });

            pageInfo.innerText = `${num} / ${pdfDoc.numPages}`;
            document.getElementById('prevPage').disabled = num <= 1;
            document.getElementById('nextPage').disabled = num >= pdfDoc.numPages;

            // Restore annotations
            restoreAnnotations(num);
            restoreDrawing(num);
            highlightThumb(num);
        }

        // ========== PAGE NAV ==========
        function pageTo(n) {
            saveCurrentAnnotations();
            saveDrawing();
            currentPage = n;
            renderPage(n);
        }

        document.getElementById('prevPage').addEventListener('click', () => { if (currentPage > 1) pageTo(currentPage - 1); });
        document.getElementById('nextPage').addEventListener('click', () => { if (currentPage < pdfDoc.numPages) pageTo(currentPage + 1); });

        // ========== TOOL SWITCHING ==========
        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', function () {
                if (this.dataset.tool === 'sign') { openSigModal(); return; }
                document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTool = this.dataset.tool;
                setAnnotLayerClass();
            });
        });

        function setAnnotLayerClass() {
            annotLayer.className = '';
            if (currentTool === 'text') annotLayer.classList.add('tool-text');
            else if (currentTool === 'draw') annotLayer.classList.add('tool-draw');
            else if (currentTool === 'highlight') annotLayer.classList.add('tool-highlight');
        }

        // ========== LIVE FONT SIZE UPDATE ==========
        document.getElementById('fontSize').addEventListener('input', function () {
            if (activeTextBox) {
                activeTextBox.style.fontSize = this.value + 'px';
                activeTextBox.dataset.fs = this.value;
            }
        });
        document.getElementById('textColor').addEventListener('input', function () {
            if (activeTextBox) {
                activeTextBox.style.color = this.value;
                activeTextBox.dataset.col = this.value;
            }
        });

        // ========== CLICK TO ADD TEXT ==========
        annotLayer.addEventListener('click', function (e) {
            if (currentTool === 'text') {
                if (e.target !== annotLayer && !e.target.classList.contains('anno-text')) return;
                if (e.target === annotLayer) {
                    addTextBox(e.offsetX, e.offsetY);
                }
            }
        });

        function addTextBox(x, y) {
            const fs = parseInt(document.getElementById('fontSize').value) || 16;
            const col = document.getElementById('textColor').value;

            const wrap = document.createElement('div');
            wrap.className = 'anno-text';
            wrap.style.cssText = `left:${x}px; top:${y}px; font-size:${fs}px; color:${col}; font-family:'Inter',sans-serif;`;
            wrap.dataset.fs = fs;
            wrap.dataset.col = col;

            const del = document.createElement('i');
            del.className = 'delete-handle';
            del.innerHTML = '×';
            del.addEventListener('click', (e) => { e.stopPropagation(); wrap.remove(); });
            wrap.appendChild(del);

            const span = document.createElement('span');
            span.contentEditable = true;
            span.innerText = 'Text';
            span.addEventListener('focus', () => {
                activeTextBox = wrap;
                document.getElementById('fontSize').value = wrap.dataset.fs || 16;
                document.getElementById('textColor').value = wrap.dataset.col || '#000000';
            });
            span.addEventListener('blur', () => {
                setTimeout(() => {
                    const active = document.activeElement;
                    if (active !== document.getElementById('fontSize') && active !== document.getElementById('textColor')) {
                        activeTextBox = null;
                    }
                }, 150);
            });
            wrap.appendChild(span);

            makeDraggable(wrap);
            annotLayer.appendChild(wrap);
            span.focus();
            selectAll(span);
            undoStack.push({ type: 'text', el: wrap });
        }

        function selectAll(el) {
            const range = document.createRange();
            range.selectNodeContents(el);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
        }

        // ========== HIGHLIGHT TOOL ==========
        let hlStartX = null, hlStartY = null;
        let hlPreview = null;

        annotLayer.addEventListener('mousedown', function (e) {
            if (currentTool !== 'highlight') return;
            if (e.target !== annotLayer) return;
            hlStartX = e.offsetX; hlStartY = e.offsetY;

            hlPreview = document.createElement('div');
            hlPreview.style.cssText = `position:absolute; left:${hlStartX}px; top:${hlStartY}px; width:0; height:0; background:${document.getElementById('hlColor').value}66; pointer-events:none;`;
            annotLayer.appendChild(hlPreview);
        });

        annotLayer.addEventListener('mousemove', function (e) {
            if (currentTool !== 'highlight' || !hlPreview) return;
            const w = e.offsetX - hlStartX;
            const h = e.offsetY - hlStartY;
            hlPreview.style.width = Math.abs(w) + 'px';
            hlPreview.style.height = Math.abs(h) + 'px';
            hlPreview.style.left = (w < 0 ? e.offsetX : hlStartX) + 'px';
            hlPreview.style.top = (h < 0 ? e.offsetY : hlStartY) + 'px';
        });

        annotLayer.addEventListener('mouseup', function (e) {
            if (currentTool !== 'highlight' || !hlPreview) return;
            hlPreview.classList.add('anno-highlight');
            const del = document.createElement('i');
            del.className = 'delete-handle';
            del.innerHTML = '×';
            del.addEventListener('click', (ev) => { ev.stopPropagation(); hlPreview.remove(); });
            hlPreview.appendChild(del);
            hlPreview.style.pointerEvents = 'auto';
            makeDraggable(hlPreview);
            undoStack.push({ type: 'highlight', el: hlPreview });
            hlPreview = null;
        });

        // ========== DRAW TOOL ==========
        let isDrawing = false, lastX = 0, lastY = 0;

        pdfWrap.addEventListener('mousedown', function (e) {
            if (currentTool !== 'draw') return;
            isDrawing = true;
            // Save state for undo
            const tempC = document.createElement('canvas');
            tempC.width = drawCanvas.width; tempC.height = drawCanvas.height;
            tempC.getContext('2d').drawImage(drawCanvas, 0, 0);
            undoStack.push({ type: 'draw', state: tempC });

            const rect = drawCanvas.getBoundingClientRect();
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;
        });

        pdfWrap.addEventListener('mousemove', function (e) {
            if (!isDrawing || currentTool !== 'draw') return;
            const rect = drawCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            drawCtx.strokeStyle = document.getElementById('drawColor').value;
            drawCtx.lineWidth = parseInt(document.getElementById('drawSize').value);
            drawCtx.lineCap = 'round';
            drawCtx.lineJoin = 'round';
            drawCtx.beginPath();
            drawCtx.moveTo(lastX, lastY);
            drawCtx.lineTo(x, y);
            drawCtx.stroke();
            lastX = x; lastY = y;
        });

        pdfWrap.addEventListener('mouseup', () => { isDrawing = false; });
        pdfWrap.addEventListener('mouseleave', () => { isDrawing = false; });

        // Touch support for draw on mobile
        pdfWrap.addEventListener('touchstart', function (e) {
            if (currentTool !== 'draw') return;
            e.preventDefault();

            const tempC = document.createElement('canvas');
            tempC.width = drawCanvas.width; tempC.height = drawCanvas.height;
            tempC.getContext('2d').drawImage(drawCanvas, 0, 0);
            undoStack.push({ type: 'draw', state: tempC });

            const t = e.touches[0];
            const rect = drawCanvas.getBoundingClientRect();
            lastX = t.clientX - rect.left;
            lastY = t.clientY - rect.top;
            isDrawing = true;
        }, { passive: false });

        pdfWrap.addEventListener('touchmove', function (e) {
            if (!isDrawing || currentTool !== 'draw') return;
            e.preventDefault();
            const t = e.touches[0];
            const rect = drawCanvas.getBoundingClientRect();
            const x = t.clientX - rect.left;
            const y = t.clientY - rect.top;
            drawCtx.strokeStyle = document.getElementById('drawColor').value;
            drawCtx.lineWidth = parseInt(document.getElementById('drawSize').value);
            drawCtx.lineCap = 'round';
            drawCtx.beginPath();
            drawCtx.moveTo(lastX, lastY);
            drawCtx.lineTo(x, y);
            drawCtx.stroke();
            lastX = x; lastY = y;
        }, { passive: false });

        pdfWrap.addEventListener('touchend', () => { isDrawing = false; });

        // ========== SIGNATURE MODAL ==========
        const sigCtx = sigCanvas.getContext('2d');
        let isSigning = false, sigLastX = 0, sigLastY = 0;
        let capturedSigDataUrl = null;
        let sigUndoStack = [];
        let currentSigTab = 'draw';
        let currentSigFont = 'Dancing Script';

        // Load cursive font for typed signatures
        const fontLink = document.createElement('link');
        fontLink.rel = 'stylesheet';
        fontLink.href = 'https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap';
        document.head.appendChild(fontLink);

        function switchSigTab(tab) {
            currentSigTab = tab;
            document.getElementById('sigPaneDraw').style.display = tab === 'draw' ? 'block' : 'none';
            document.getElementById('sigPaneType').style.display = tab === 'type' ? 'block' : 'none';
            document.getElementById('sigPaneUpload').style.display = tab === 'upload' ? 'block' : 'none';
            // Tab button styles
            ['draw', 'type', 'upload'].forEach(t => {
                const btn = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
                btn.style.background = t === tab ? 'var(--accent)' : 'transparent';
                btn.style.color = t === tab ? '#fff' : 'var(--fg)';
            });
            // Undo only relevant for draw, but Clear applies to all
            document.getElementById('sigUndoBtn').style.display = tab === 'draw' ? 'inline-flex' : 'none';
            document.getElementById('clearSigBtn').style.display = 'inline-flex';
        }

        function setSigFont(font) {
            currentSigFont = font;
            renderTypedSig();
        }

        function renderTypedSig() {
            const canvas = document.getElementById('sigTypePreview');
            const ctx = canvas.getContext('2d');
            const text = document.getElementById('sigTypeInput').value || 'Your Signature';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#111';
            ctx.font = `48px '${currentSigFont}', cursive, serif`;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        }

        document.getElementById('sigTypeInput').addEventListener('input', renderTypedSig);

        // Upload PNG/image handler
        let uploadedSigImg = null;
        document.getElementById('sigFileInput').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                uploadedSigImg = new Image();
                uploadedSigImg.onload = () => {
                    document.getElementById('sigUploadBox').style.display = 'none';
                    document.getElementById('sigUploadControls').style.display = 'block';
                    renderUploadedSig();
                };
                uploadedSigImg.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('sigRemoveBg').addEventListener('change', (e) => {
            document.getElementById('sigRemoveBgOptions').style.display = e.target.checked ? 'block' : 'none';
            if (uploadedSigImg) renderUploadedSig();
        });

        document.getElementById('sigBgTolerance').addEventListener('input', () => { if (uploadedSigImg) renderUploadedSig(); });
        document.getElementById('sigMakeBlack').addEventListener('change', () => { if (uploadedSigImg) renderUploadedSig(); });

        function renderUploadedSig() {
            const canvas = document.getElementById('sigUploadPreview');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            canvas.width = uploadedSigImg.naturalWidth;
            canvas.height = uploadedSigImg.naturalHeight;
            canvas.style.maxHeight = '150px';
            canvas.style.objectFit = 'contain';

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(uploadedSigImg, 0, 0);

            if (document.getElementById('sigRemoveBg').checked) {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                const tolerance = parseInt(document.getElementById('sigBgTolerance').value);
                const makeBlack = document.getElementById('sigMakeBlack').checked;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
                    const brightness = (r + g + b) / 3;

                    if (brightness > tolerance) {
                        data[i + 3] = 0; // Set alpha to 0
                    } else if (makeBlack) {
                        data[i] = 0; data[i + 1] = 0; data[i + 2] = 0;
                        const alpha = Math.max(0, Math.min(255, 255 - ((brightness / tolerance) * 255)));
                        data[i + 3] = alpha;
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            }
            canvas.style.display = 'block';
        }

        function openSigModal() {
            sigModal.classList.add('open');
            sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
            sigUndoStack = [];
            resetUploadState();
            switchSigTab('draw');
        }

        function resetUploadState() {
            uploadedSigImg = null;
            document.getElementById('sigFileInput').value = '';
            document.getElementById('sigUploadBox').style.display = 'block';
            document.getElementById('sigUploadControls').style.display = 'none';
            const c = document.getElementById('sigUploadPreview');
            c.getContext('2d').clearRect(0, 0, c.width, c.height);
        }

        document.getElementById('closeSigBtn').addEventListener('click', () => sigModal.classList.remove('open'));
        document.getElementById('clearSigBtn').addEventListener('click', () => {
            if (currentSigTab === 'draw') {
                sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
                sigUndoStack = [];
            } else if (currentSigTab === 'upload') {
                resetUploadState();
            } else if (currentSigTab === 'type') {
                document.getElementById('sigTypeInput').value = '';
                renderTypedSig();
            }
        });

        document.getElementById('sigUndoBtn').addEventListener('click', () => {
            const last = sigUndoStack.pop();
            sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
            if (last) sigCtx.drawImage(last, 0, 0);
        });

        sigCanvas.addEventListener('mousedown', e => {
            const tempC = document.createElement('canvas');
            tempC.width = sigCanvas.width; tempC.height = sigCanvas.height;
            tempC.getContext('2d').drawImage(sigCanvas, 0, 0);
            sigUndoStack.push(tempC);
            isSigning = true;
            const r = sigCanvas.getBoundingClientRect();
            sigLastX = (e.clientX - r.left) * (sigCanvas.width / r.width);
            sigLastY = (e.clientY - r.top) * (sigCanvas.height / r.height);
        });

        sigCanvas.addEventListener('mousemove', e => {
            if (!isSigning) return;
            const r = sigCanvas.getBoundingClientRect();
            const x = (e.clientX - r.left) * (sigCanvas.width / r.width);
            const y = (e.clientY - r.top) * (sigCanvas.height / r.height);
            sigCtx.strokeStyle = '#000'; sigCtx.lineWidth = 2.5; sigCtx.lineCap = 'round';
            sigCtx.beginPath(); sigCtx.moveTo(sigLastX, sigLastY); sigCtx.lineTo(x, y); sigCtx.stroke();
            sigLastX = x; sigLastY = y;
        });

        sigCanvas.addEventListener('mouseup', () => { isSigning = false; });
        sigCanvas.addEventListener('mouseleave', () => { isSigning = false; });

        sigCanvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const tempC = document.createElement('canvas');
            tempC.width = sigCanvas.width; tempC.height = sigCanvas.height;
            tempC.getContext('2d').drawImage(sigCanvas, 0, 0);
            sigUndoStack.push(tempC);
            const t = e.touches[0], r = sigCanvas.getBoundingClientRect();
            sigLastX = (t.clientX - r.left) * (sigCanvas.width / r.width);
            sigLastY = (t.clientY - r.top) * (sigCanvas.height / r.height);
            isSigning = true;
        }, { passive: false });

        sigCanvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!isSigning) return;
            const t = e.touches[0], r = sigCanvas.getBoundingClientRect();
            const x = (t.clientX - r.left) * (sigCanvas.width / r.width);
            const y = (t.clientY - r.top) * (sigCanvas.height / r.height);
            sigCtx.strokeStyle = '#000'; sigCtx.lineWidth = 2.5; sigCtx.lineCap = 'round';
            sigCtx.beginPath(); sigCtx.moveTo(sigLastX, sigLastY); sigCtx.lineTo(x, y); sigCtx.stroke();
            sigLastX = x; sigLastY = y;
        }, { passive: false });

        document.getElementById('applySigBtn').addEventListener('click', () => {
            let dataUrl = null;
            if (currentSigTab === 'draw') {
                dataUrl = sigCanvas.toDataURL();
            } else if (currentSigTab === 'type') {
                renderTypedSig();
                dataUrl = document.getElementById('sigTypePreview').toDataURL();
            } else if (currentSigTab === 'upload') {
                const canvas = document.getElementById('sigUploadPreview');
                if (canvas.style.display === 'none') {
                    alert('Please upload an image first.');
                    return;
                }
                dataUrl = canvas.toDataURL();
            }
            if (!dataUrl) return;
            const allPages = document.getElementById('sigAllPages').checked;
            sigModal.classList.remove('open');
            placeSignature(dataUrl, allPages);
            document.getElementById('sigAllPages').checked = false;
        });

        function placeSignature(dataUrl, toAllPages) {
            const sigStyle = 'position:absolute; left:60px; top:60px; width:160px; height:auto; cursor:move; border:1px dashed rgba(37,99,235,0.4); pointer-events:auto; overflow:hidden; min-width:50px; min-height:30px; z-index:100;';
            const wrap = document.createElement('div');
            wrap.className = 'anno-text';
            wrap.style.cssText = sigStyle;

            const del = document.createElement('i');
            del.className = 'delete-handle';
            del.innerHTML = '×';
            del.title = 'Remove';
            del.addEventListener('click', (e) => { e.stopPropagation(); wrap.remove(); });
            wrap.appendChild(del);

            const copyAll = document.createElement('i');
            copyAll.className = 'copy-all-handle';
            copyAll.innerHTML = 'A';
            copyAll.title = 'Apply exact position to all pages';
            copyAll.addEventListener('click', (e) => {
                e.stopPropagation();
                copySignatureToAll(wrap, dataUrl);
            });
            wrap.appendChild(copyAll);

            const img = document.createElement('img');
            img.src = dataUrl;
            img.setAttribute('draggable', 'false');
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.display = 'block';
            
            wrap.style.resize = 'both';
            wrap.appendChild(img);
            
            makeDraggable(wrap);
            annotLayer.appendChild(wrap);
            undoStack.push({ type: 'sig', el: wrap });

            if (toAllPages) {
                copySignatureToAll(wrap, dataUrl);
            }
        }

        function copySignatureToAll(el, dataUrl) {
            const left = parseInt(el.style.left) || 60;
            const top = parseInt(el.style.top) || 60;
            const width = parseInt(el.style.width) || parseInt(window.getComputedStyle(el).width) || 160;
            const height = parseInt(el.style.height) || parseInt(window.getComputedStyle(el).height) || 0;
            
            for (let p = 1; p <= pdfDoc.numPages; p++) {
                if (!pageAnnotations[p]) pageAnnotations[p] = [];
                pageAnnotations[p].push({
                    html: `<img src="${dataUrl}" style="position:absolute; left:${left}px; top:${top}px; width:${width}px; height:${height ? height+'px' : 'auto'}; z-index:100;">`,
                    type: 'img', normX: left / scale, normY: top / scale, normW: width / scale, normH: height ? height / scale : 0
                });
            }
            alert('Signature position copied to all pages! It will appear precisely here when you export.');
        }

        // ========== DRAGGABLE ==========
        function makeDraggable(el) {
            let startX, startY, origLeft, origTop;
            el.addEventListener('mousedown', function (e) {
                if (window.getComputedStyle(el).resize && window.getComputedStyle(el).resize !== 'none') {
                    const rect = el.getBoundingClientRect();
                    if (e.clientX > rect.right - 20 && e.clientY > rect.bottom - 20) {
                        return;
                    }
                }
                if (currentTool !== 'select' && !el.classList.contains('anno-text') && e.target !== el) return;
                if (e.target.classList && e.target.classList.contains('delete-handle')) return;
                e.stopPropagation();
                startX = e.clientX; startY = e.clientY;
                origLeft = parseInt(el.style.left) || 0;
                origTop = parseInt(el.style.top) || 0;

                function onMove(ev) {
                    el.style.left = (origLeft + ev.clientX - startX) + 'px';
                    el.style.top = (origTop + ev.clientY - startY) + 'px';
                }
                function onUp() {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                }
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        }

        // ========== ZOOM ==========
        document.getElementById('zoomIn').addEventListener('click', () => { saveCurrentAnnotations(); saveDrawing(); scale = Math.min(scale + 0.2, 3); updateZoom(); });
        document.getElementById('zoomOut').addEventListener('click', () => { saveCurrentAnnotations(); saveDrawing(); scale = Math.max(scale - 0.2, 0.4); updateZoom(); });
        function updateZoom() {
            document.getElementById('zoomLabel').innerText = Math.round(scale * 100) + '%';
            renderPage(currentPage);
        }

        // ========== UNDO ==========
        document.getElementById('undoBtn').addEventListener('click', () => {
            const last = undoStack.pop();
            if (last) {
                if (last.type === 'draw') {
                    drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
                    drawCtx.drawImage(last.state, 0, 0);
                } else if (last.el && last.el.parentNode) {
                    last.el.remove();
                }
            }
        });

        // ========== CLEAR PAGE ==========
        document.getElementById('clearPageBtn').addEventListener('click', () => {
            clearAnnotLayer();
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            undoStack = [];
        });

        function clearAnnotLayer() {
            annotLayer.innerHTML = '';
        }

        // ========== SAVE / RESTORE ANNOTATIONS ==========
        const pageAnnotations = {};  // pageNum -> [{type, el}]

        function saveCurrentAnnotations() {
            pageAnnotations[currentPage] = Array.from(annotLayer.children).map(el => ({
                html: el.outerHTML,
                type: el.tagName === 'IMG' ? 'img' : 'div',
                normX: parseFloat(el.style.left) / scale,
                normY: parseFloat(el.style.top) / scale,
                normW: parseFloat(el.style.width) / scale,
                normH: parseFloat(el.style.height) / scale,
                normFs: parseFloat(el.dataset.fs || '16') / scale
            }));
        }

        function restoreAnnotations(num) {
            const saved = pageAnnotations[num];
            if (!saved) return;
            saved.forEach(item => {
                const tmp = document.createElement('div');
                tmp.innerHTML = item.html;
                const el = tmp.firstChild;
                if (!el) return;

                if (!isNaN(item.normX)) el.style.left = (item.normX * scale) + 'px';
                if (!isNaN(item.normY)) el.style.top = (item.normY * scale) + 'px';
                if (!isNaN(item.normW)) el.style.width = (item.normW * scale) + 'px';
                if (!isNaN(item.normH)) el.style.height = (item.normH * scale) + 'px';

                if (!isNaN(item.normFs) && el.classList.contains('anno-text')) {
                    const newFs = item.normFs * scale;
                    el.style.fontSize = Math.round(newFs) + 'px';
                    el.dataset.fs = Math.round(newFs);
                }

                if (el.querySelector) {
                    const del = el.querySelector('.delete-handle');
                    if (del) del.addEventListener('click', ev => { ev.stopPropagation(); el.remove(); });
                    const span = el.querySelector('span');
                    if (span) {
                        span.addEventListener('focus', () => {
                            activeTextBox = el;
                            document.getElementById('fontSize').value = el.dataset.fs || 16;
                            document.getElementById('textColor').value = el.dataset.col || '#000000';
                        });
                        span.addEventListener('blur', () => {
                            setTimeout(() => {
                                const active = document.activeElement;
                                if (active !== document.getElementById('fontSize') && active !== document.getElementById('textColor')) {
                                    activeTextBox = null;
                                }
                            }, 150);
                        });
                    }
                }
                makeDraggable(el);
                annotLayer.appendChild(el);
            });
        }

        function saveDrawing() {
            if (!drawCanvas.width) return;
            const tempC = document.createElement('canvas');
            tempC.width = drawCanvas.width;
            tempC.height = drawCanvas.height;
            tempC.getContext('2d').drawImage(drawCanvas, 0, 0);
            drawHistory[currentPage] = tempC;
        }

        function restoreDrawing(num) {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            const savedC = drawHistory[num];
            if (savedC) {
                drawCtx.drawImage(savedC, 0, 0, drawCanvas.width, drawCanvas.height);
            }
        }

        // Listen for page changes to save annotations
        document.getElementById('prevPage').addEventListener('click', () => { saveCurrentAnnotations(); saveDrawing(); }, true);
        document.getElementById('nextPage').addEventListener('click', () => { saveCurrentAnnotations(); saveDrawing(); }, true);

        // ========== THUMBNAILS ==========
        async function buildThumbnails() {
            thumbSidebar.innerHTML = '';
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const vp = page.getViewport({ scale: 0.2 });
                const tc = document.createElement('canvas');
                tc.width = vp.width; tc.height = vp.height;
                await page.render({ canvasContext: tc.getContext('2d'), viewport: vp }).promise;
                const item = document.createElement('div');
                item.className = 'thumb-item' + (i === 1 ? ' active' : '');
                item.dataset.page = i;
                const p = document.createElement('p');
                p.innerText = i;
                item.appendChild(tc);
                item.appendChild(p);
                item.addEventListener('click', () => { saveCurrentAnnotations(); pageTo(i); });
                thumbSidebar.appendChild(item);
            }
        }

        function highlightThumb(n) {
            document.querySelectorAll('.thumb-item').forEach(t => {
                t.classList.toggle('active', parseInt(t.dataset.page) === n);
            });
        }

        // ========== EXPORT PDF ==========
        exportBtn.addEventListener('click', async () => {
            if (!originalPdfBytes) return;
            exportBtn.disabled = true;
            exportBtn.innerText = 'Exporting...';

            saveCurrentAnnotations();
            saveDrawing();

            try {
                const { PDFDocument, rgb, StandardFonts } = PDFLib;
                const pdfLibDoc = await PDFDocument.load(originalPdfBytes);
                const helvetica = await pdfLibDoc.embedFont(StandardFonts.Helvetica);
                const pages = pdfLibDoc.getPages();

                for (let p = 1; p <= pdfLibDoc.getPageCount(); p++) {
                    const page = pages[p - 1];
                    const { height } = page.getSize();

                    // 1) Embed draw canvas
                    const savedC = drawHistory[p];
                    if (savedC) {
                        const pngDataUrl = savedC.toDataURL('image/png');
                        const pngBytes = await fetch(pngDataUrl).then(r => r.arrayBuffer());
                        const embeddedPng = await pdfLibDoc.embedPng(pngBytes);
                        page.drawImage(embeddedPng, { x: 0, y: 0, width: savedC.width / scale, height: savedC.height / scale });
                    }

                    // 2) Embed text annotations
                    const saved = pageAnnotations[p];
                    if (!saved) continue;
                    for (const item of saved) {
                        if (item.type === 'div') {
                            const tmp = document.createElement('div');
                            tmp.innerHTML = item.html;
                            const el = tmp.firstChild;
                            if (!el) continue;

                            const isHighlight = el.classList && el.classList.contains('anno-highlight');
                            const x = parseFloat(el.style.left) / scale;
                            const w = parseFloat(el.style.width) / scale || 100;
                            const yCanvas = parseFloat(el.style.top) / scale;
                            const h = parseFloat(el.style.height) / scale || 20;

                            if (isHighlight) {
                                const raw = el.style.background || 'rgba(250,204,21,0.4)';
                                page.drawRectangle({ x, y: height - yCanvas - h, width: w, height: h, color: rgb(0.98, 0.8, 0.1), opacity: 0.4 });
                            } else {
                                // Regular text box
                                const spanEl = el.querySelector('span');
                                const text = spanEl ? spanEl.innerText.trim() : el.innerText.trim();
                                if (!text) continue;
                                const fs = parseFloat(el.dataset.fs || '16') / scale;
                                const colHex = el.dataset.col || '#000000';
                                const r2 = parseInt(colHex.substr(1, 2), 16) / 255;
                                const g2 = parseInt(colHex.substr(3, 2), 16) / 255;
                                const b2 = parseInt(colHex.substr(5, 2), 16) / 255;
                                page.drawText(text, { x, y: height - yCanvas - fs, size: fs, font: helvetica, color: rgb(r2, g2, b2) });
                            }
                        } else if (item.type === 'img') {
                            // Signature image
                            const tmp = document.createElement('div');
                            tmp.innerHTML = item.html;
                            const imgEl = tmp.firstChild;
                            if (!imgEl || !imgEl.src) continue;
                            const pngBytes = await fetch(imgEl.src).then(r => r.arrayBuffer());
                            const embeddedImg = await pdfLibDoc.embedPng(pngBytes);
                            const x = parseFloat(imgEl.style.left) / scale;
                            const yCanvas = parseFloat(imgEl.style.top) / scale;
                            const w = parseFloat(imgEl.style.width) / scale || 80;
                            const h = parseFloat(imgEl.style.height) / scale || 35;
                            page.drawImage(embeddedImg, { x, y: height - yCanvas - h, width: w, height: h });
                        }
                    }
                }

                const bytes = await pdfLibDoc.save();
                const blob = new Blob([bytes], { type: 'application/pdf' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = 'Edited_PDFSuite.pdf'; a.click();
            } catch (err) {
                console.error(err); alert('Export failed. See console for details.');
            }

            exportBtn.disabled = false;
            exportBtn.innerText = 'Export PDF';
        });
    </script>
    <script src="../src/js/protect.js"></script>
    <script src="../src/js/adblock-detect.js" defer></script>
