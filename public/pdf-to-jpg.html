<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to JPG - PDFSuite</title>

    <link rel="stylesheet" href="../src/css/base.css" />
    <link rel="stylesheet" href="../src/css/dashboard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        .workspace {
            max-width: 800px;
            margin: 3rem auto;
            padding: 2rem;
            background: var(--bg-soft);
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
            text-align: center;
        }

        .upload-box {
            border: 2px dashed #f59e0b;
            padding: 3rem;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 2rem;
            background: rgba(245, 158, 11, 0.05);
        }

        .btn-large {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            width: 100%;
            font-weight: 600;
        }

        #image-output {
            margin-top: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }

        .pdf-page-img {
            max-width: 100%;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7048088905906211"
        crossorigin="anonymous"></script>

    <!-- Auto Theme Detector -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('pdfsuite-theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else {
                const hour = new Date().getHours();
                const theme = (hour >= 6 && hour < 18) ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();
    </script>
</head>

<body>

    <header class="site-header">
        <div class="header-inner">
            <a href="../index.html" class="logo">PDF<span>Suite</span></a>
            <div class="header-actions"><a href="../index.html" class="btn-ghost btn-small">Back to Tools</a></div>
        </div>
    </header>

    <div class="ad-banner-section">
        
    <div class="ad-container" style="text-align: center; margin: 1rem 0;">
      <ins class="adsbygoogle"
           style="display:inline-block;width:728px;height:90px"
           data-ad-client="ca-pub-7048088905906211"></ins>
      <script>
           (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    </div>

    <div class="workspace">
        <h1>Convert PDF to JPG</h1>
        <p>Extract all pages of your PDF into high-quality JPG images directly inside your browser.</p>

        <div class="upload-box" id="uploadBox">
            <h2>Select PDF File</h2>
            <input type="file" id="fileInput" accept="application/pdf" hidden>
        </div>

        <div id="actionArea" style="display: none;">
            <p id="fileInfo" style="margin-bottom: 1.5rem; font-weight: 600;"></p>
            <button class="btn-primary btn-large" id="convertBtn">Extract Images</button>
            <p id="statusMsg" style="margin-top: 1rem; color: #f59e0b;"></p>
            <div id="image-output"></div>
        </div>
    </div>

    <div class="ad-banner-section bottom-ad">
        
    <div class="ad-container" style="text-align: center; margin: 1rem 0;">
      <ins class="adsbygoogle"
           style="display:inline-block;width:300px;height:250px"
           data-ad-client="ca-pub-7048088905906211"></ins>
      <script>
           (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const actionArea = document.getElementById('actionArea');
        const convertBtn = document.getElementById('convertBtn');
        const statusMsg = document.getElementById('statusMsg');
        const imageOutput = document.getElementById('image-output');
        const fileInfo = document.getElementById('fileInfo');

        let pdfDocBytes = null;
        let fileName = '';

        uploadBox.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                pdfDocBytes = await file.arrayBuffer();
                fileName = file.name.replace('.pdf', '');
                uploadBox.style.display = 'none';
                actionArea.style.display = 'block';
                fileInfo.innerText = `Selected: ${file.name}`;
            }
        });

        convertBtn.addEventListener('click', async () => {
            try {
                convertBtn.disabled = true;
                statusMsg.innerText = "Extracting images... Parsing document...";
                statusMsg.style.color = "#f59e0b";
                imageOutput.innerHTML = '';

                const doc = await pdfjsLib.getDocument({ data: new Uint8Array(pdfDocBytes) }).promise;
                const zip = new JSZip();

                for (let i = 1; i <= doc.numPages; i++) {
                    statusMsg.innerText = `Extracting page ${i} of ${doc.numPages}...`;
                    const page = await doc.getPage(i);
                    const viewport = page.getViewport({ scale: 2.0 });

                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const ctx = canvas.getContext('2d');

                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                    if (i <= 3) {
                        const img = document.createElement('img');
                        img.src = canvas.toDataURL('image/jpeg', 0.8);
                        img.className = 'pdf-page-img';
                        img.style.maxHeight = '200px';
                        img.style.objectFit = 'contain';
                        imageOutput.appendChild(img);
                    } else if (i === 4) {
                        const text = document.createElement('p');
                        text.innerText = "... and " + (doc.numPages - 3) + " more pages.";
                        imageOutput.appendChild(text);
                    }

                    const imgData = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
                    zip.file(`Page_${i}.jpg`, imgData, { base64: true });
                }

                statusMsg.innerText = "Zipping images...";
                const content = await zip.generateAsync({ type: "blob" });

                const url = window.URL.createObjectURL(content);
                statusMsg.innerHTML = `<br><a href="${url}" download="${fileName}_Images.zip" class="btn-primary btn-large" style="text-decoration:none; display:inline-block; max-width:400px; background:#f59e0b;">Download All Images in ZIP</a><br><button class="btn-ghost" style="margin-top:1rem;" onclick="location.reload()">Convert Another</button>`;

                convertBtn.style.display = 'none';

            } catch (err) {
                console.error(err);
                statusMsg.innerText = "Failed to convert PDF.";
                statusMsg.style.color = "#ef4444";
                convertBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
