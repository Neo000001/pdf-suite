<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to JPG - PDFSuite</title>

    <link rel="stylesheet" href="../src/css/base.css" />
    <link rel="stylesheet" href="../src/css/dashboard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        .workspace {
            max-width: 800px;
            margin: 3rem auto;
            padding: 2rem;
            background: var(--bg-soft);
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
            text-align: center;
        }

        .upload-box {
            border: 2px dashed #f59e0b;
            padding: 3rem;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 2rem;
            background: rgba(245, 158, 11, 0.05);
        }

        .btn-large {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            width: 100%;
            font-weight: 600;
        }

        #image-output {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .pdf-page-img {
            max-width: 100%;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
        }

        .download-link {
            color: #f59e0b;
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>

<body>

    <header class="site-header">
        <div class="header-inner">
            <a href="../index.html" class="logo">PDF<span>Suite</span></a>
            <div class="header-actions"><a href="../index.html" class="btn-ghost btn-small">Back to Tools</a></div>
        </div>
    </header>

    <div class="ad-banner-section">
        <div class="ad-placeholder"><span>Google Ads - 728x90 Top placement</span></div>
    </div>

    <div class="workspace">
        <h1>Convert PDF to JPG</h1>
        <p>Extract all pages of your PDF into high-quality JPG images directly inside your browser.</p>

        <div class="upload-box" id="uploadBox">
            <h2>📄 Select PDF File</h2>
            <input type="file" id="fileInput" accept="application/pdf" hidden>
        </div>

        <div id="actionArea" style="display: none;">
            <p id="fileInfo" style="margin-bottom: 1.5rem; font-weight: 600;"></p>
            <button class="btn-primary btn-large" id="convertBtn">Extract Images</button>
            <p id="statusMsg" style="margin-top: 1rem; color: #f59e0b;"></p>
            <div id="image-output"></div>
        </div>
    </div>

    <div class="ad-banner-section bottom-ad">
        <div class="ad-placeholder square"><span>Google Ads - 300x250</span></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const actionArea = document.getElementById('actionArea');
        const convertBtn = document.getElementById('convertBtn');
        const statusMsg = document.getElementById('statusMsg');
        const imageOutput = document.getElementById('image-output');
        const fileInfo = document.getElementById('fileInfo');

        let pdfDocBytes = null;
        let fileName = '';

        uploadBox.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                pdfDocBytes = await file.arrayBuffer();
                fileName = file.name.replace('.pdf', '');
                uploadBox.style.display = 'none';
                actionArea.style.display = 'block';
                fileInfo.innerText = `Selected: ${file.name}`;
            }
        });

        convertBtn.addEventListener('click', async () => {
            try {
                convertBtn.disabled = true;
                statusMsg.innerText = "Extracting images... Parsing document...";
                imageOutput.innerHTML = '';

                const doc = await pdfjsLib.getDocument({ data: new Uint8Array(pdfDocBytes) }).promise;

                for (let i = 1; i <= doc.numPages; i++) {
                    statusMsg.innerText = `Extracting page ${i} of ${doc.numPages}...`;
                    const page = await doc.getPage(i);
                    const viewport = page.getViewport({ scale: 2.0 }); // High quality 2.0 scale

                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const ctx = canvas.getContext('2d');

                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                    const imgDataUrl = canvas.toDataURL('image/jpeg', 0.9);

                    const container = document.createElement('div');
                    container.style.display = 'flex';
                    container.style.flexDirection = 'column';

                    const img = document.createElement('img');
                    img.src = imgDataUrl;
                    img.className = 'pdf-page-img';

                    const dlLink = document.createElement('a');
                    dlLink.href = imgDataUrl;
                    dlLink.download = `${fileName}_page_${i}.jpg`;
                    dlLink.innerText = `⬇ Download Page ${i} JPG`;
                    dlLink.className = 'download-link';

                    container.appendChild(img);
                    container.appendChild(dlLink);
                    imageOutput.appendChild(container);
                }

                statusMsg.innerText = "Success! All pages converted to JPG.";
                statusMsg.style.color = "#22c55e";
                convertBtn.style.display = 'none';

            } catch (err) {
                console.error(err);
                statusMsg.innerText = "Failed to convert PDF.";
                statusMsg.style.color = "#ef4444";
                convertBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
