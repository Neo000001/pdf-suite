<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove PDF Pages - PDFSuite</title>

    <link rel="stylesheet" href="../src/css/base.css" />
    <link rel="stylesheet" href="../src/css/dashboard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        .workspace {
            max-width: 800px;
            margin: 3rem auto;
            padding: 2rem;
            background: var(--bg-soft);
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
            text-align: center;
        }

        .upload-box {
            border: 2px dashed #ef4444;
            padding: 3rem;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 2rem;
            background: rgba(239, 68, 68, 0.05);
        }

        .page-input {
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
            background: var(--bg);
            color: var(--fg);
            width: 100%;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 999px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .btn-danger:hover {
            background: #dc2626;
        }
    </style>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>

<body>

    <!-- HEADER -->
    <header class="site-header">
        <div class="header-inner">
            <a href="../index.html" class="logo">PDF<span>Suite</span></a>
            <div class="header-actions">
                <a href="../index.html" class="btn-ghost btn-small">Back to Tools</a>
            </div>
        </div>
    </header>

    <div class="workspace">
        <h1>Remove PDF Pages</h1>
        <p>Delete unnecessary pages to clean up your document.</p>

        <div class="upload-box" id="uploadBox">
            <h2>🚮 Drop PDF here to Remove Pages</h2>
            <input type="file" id="fileInput" accept="application/pdf" hidden>
        </div>

        <div id="actionArea" style="display: none;">
            <p id="fileInfo" style="margin-bottom: 1.5rem; font-weight: 600;"></p>

            <div style="text-align: left; margin-bottom: 1.5rem;">
                <label>Pages to Delete (e.g. 1, 4-6):</label>
                <input type="text" class="page-input" id="rangeInput" placeholder="1, 4-6">
            </div>

            <button class="btn-danger" id="processBtn">Delete Selected Pages & Download</button>
            <p id="statusMsg" style="margin-top: 1rem; color: #22c55e;"></p>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const actionArea = document.getElementById('actionArea');
        const fileInfo = document.getElementById('fileInfo');
        const processBtn = document.getElementById('processBtn');
        const rangeInput = document.getElementById('rangeInput');
        const statusMsg = document.getElementById('statusMsg');

        let currentPdfBytes = null;
        let fileName = '';

        uploadBox.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                currentPdfBytes = await file.arrayBuffer();
                fileName = file.name;
                uploadBox.style.display = 'none';
                actionArea.style.display = 'block';
                fileInfo.innerText = `Selected: ${fileName}`;
            }
        });

        processBtn.addEventListener('click', async () => {
            try {
                processBtn.disabled = true;
                processBtn.innerText = "Processing...";

                const { PDFDocument } = PDFLib;
                const sourceDoc = await PDFDocument.load(currentPdfBytes);
                const totalPages = sourceDoc.getPageCount();

                const pagesToDelete = new Set();
                const ranges = rangeInput.value.split(',');

                for (let r of ranges) {
                    r = r.trim();
                    if (r.includes('-')) {
                        const parts = r.split('-');
                        let start = parseInt(parts[0]);
                        let end = parseInt(parts[1]);
                        if (!isNaN(start) && !isNaN(end)) {
                            for (let i = start; i <= end; i++) {
                                if (i > 0 && i <= totalPages) pagesToDelete.add(i - 1);
                            }
                        }
                    } else {
                        let p = parseInt(r);
                        if (!isNaN(p) && p > 0 && p <= totalPages) {
                            pagesToDelete.add(p - 1);
                        }
                    }
                }

                const sortedPagesToDelete = Array.from(pagesToDelete).sort((a, b) => b - a);

                if (sortedPagesToDelete.length === 0) {
                    alert("No valid pages selected for removal. (Document has " + totalPages + " pages).");
                    processBtn.disabled = false;
                    processBtn.innerText = "Delete Selected Pages & Download";
                    return;
                }

                for (const pageIndex of sortedPagesToDelete) {
                    sourceDoc.removePage(pageIndex);
                }

                const newPdfBytes = await sourceDoc.save();

                const blob = new Blob([newPdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Cleaned_${fileName}`;
                link.click();

                statusMsg.innerText = "Success! Cleaned PDF downloaded.";
                processBtn.innerText = "Remove more pages";
                processBtn.disabled = false;

            } catch (err) {
                console.error(err);
                alert("Failed to process document. See console.");
                processBtn.disabled = false;
                processBtn.innerText = "Delete Selected Pages & Download";
            }
        });
    </script>
</body>

</html>
