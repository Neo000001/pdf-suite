<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compress PDF - PDFSuite</title>

    <link rel="stylesheet" href="../src/css/base.css" />
    <link rel="stylesheet" href="../src/css/dashboard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7048088905906211"
        crossorigin="anonymous"></script>

    <style>
        .workspace {
            max-width: 800px;
            margin: 3rem auto;
            padding: 2rem;
            background: var(--bg-soft);
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
            text-align: center;
        }

        .upload-box {
            border: 2px dashed #10b981;
            padding: 3.5rem 2rem;
            cursor: pointer;
            border-radius: 12px;
            margin-bottom: 2rem;
            background: rgba(16, 185, 129, 0.05);
            transition: all 0.2s;
        }

        .upload-box:hover {
            background: rgba(16, 185, 129, 0.1);
            border-color: #059669;
        }

        .upload-box svg {
            width: 48px;
            height: 48px;
            color: #10b981;
            margin-bottom: 0.75rem;
        }

        .btn-large {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            width: 100%;
            font-weight: 600;
            margin-top: 1rem;
        }

        .stats-bar {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 1rem 0;
            padding: 1rem;
            background: var(--bg);
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .val {
            font-size: 1.3rem;
            font-weight: 700;
            color: #10b981;
        }

        .stat-item .lbl {
            font-size: 0.8rem;
            color: var(--fg-muted);
            margin-top: 2px;
        }
    </style>

    <!-- Auto Theme Detector -->
    <script>
        (function () {
            const savedTheme = localStorage.getItem('pdfsuite-theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else {
                const hour = new Date().getHours();
                const theme = (hour >= 6 && hour < 18) ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();
    </script>
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="../index.html" class="logo">PDF<span>Suite</span></a>
            <div class="header-actions"><a href="../index.html" class="btn-ghost btn-small">Back to Tools</a></div>
        </div>
    </header>

    <div class="ad-banner-section">
        
    <div class="ad-container" style="text-align: center; margin: 1rem 0;">
      <ins class="adsbygoogle"
           style="display:inline-block;width:728px;height:90px"
           data-ad-client="ca-pub-7048088905906211"></ins>
      <script>
           (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    </div>

    <div class="workspace">
        <h1>Compress PDF</h1>
        <p style="color:var(--fg-muted); margin-bottom:1.5rem">Reduce the file size of your PDF securely in your
            browser. No upload to any server.</p>

        <div class="upload-box" id="uploadBox">
            <i data-lucide="file-archive"></i>
            <h2>Select PDF File</h2>
            <p style="color:var(--fg-muted)">Click to upload and compress</p>
            <input type="file" id="fileInput" accept="application/pdf" hidden>
        </div>

        <div id="actionArea" style="display:none;">
            <p id="fileInfo" style="margin-bottom:1rem; font-weight:600;"></p>

            <div id="compressionOptions"
                style="margin: 1.5rem 0; text-align: left; background: var(--bg); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border-subtle);">
                <h3 style="margin-top:0; font-size:1.05rem; margin-bottom:1rem;">Select Compression Level</h3>

                <label
                    style="display:flex; align-items:flex-start; gap:10px; margin-bottom:1rem; cursor:pointer; padding: 0.5rem; border-radius: 6px; border: 1px solid transparent; transition: background 0.2s;"
                    onmouseover="this.style.background='var(--bg-soft)'"
                    onmouseout="this.style.background='transparent'">
                    <input type="radio" name="compLevel" value="hard"
                        style="margin-top:4px; transform: scale(1.2); accent-color: #10b981;">
                    <div>
                        <strong style="display:block; color:var(--fg); font-size: 1rem;">Extreme Compression
                            (Hard)</strong>
                        <span style="font-size:0.85rem; color:var(--fg-muted);">Less quality, high compression. Best for
                            tight email limits.</span>
                    </div>
                </label>

                <label
                    style="display:flex; align-items:flex-start; gap:10px; margin-bottom:1rem; cursor:pointer; padding: 0.5rem; border-radius: 6px; border: 1px solid transparent; transition: background 0.2s;"
                    onmouseover="this.style.background='var(--bg-soft)'"
                    onmouseout="this.style.background='transparent'">
                    <input type="radio" name="compLevel" value="normal" checked
                        style="margin-top:4px; transform: scale(1.2); accent-color: #10b981;">
                    <div>
                        <strong style="display:block; color:var(--fg); font-size: 1rem;">Recommended Compression
                            (Normal)</strong>
                        <span style="font-size:0.85rem; color:var(--fg-muted);">Good quality, good compression. Ideal
                            for standard usage.</span>
                    </div>
                </label>

                <label
                    style="display:flex; align-items:flex-start; gap:10px; cursor:pointer; padding: 0.5rem; border-radius: 6px; border: 1px solid transparent; transition: background 0.2s;"
                    onmouseover="this.style.background='var(--bg-soft)'"
                    onmouseout="this.style.background='transparent'">
                    <input type="radio" name="compLevel" value="low"
                        style="margin-top:4px; transform: scale(1.2); accent-color: #10b981;">
                    <div>
                        <strong style="display:block; color:var(--fg); font-size: 1rem;">Less Compression (Low)</strong>
                        <span style="font-size:0.85rem; color:var(--fg-muted);">High quality, less compression. Keeps
                            maximum fidelity.</span>
                    </div>
                </label>
            </div>

            <div class="stats-bar" id="statsBar" style="display:none;">
                <div class="stat-item">
                    <div class="val" id="origSize">-</div>
                    <div class="lbl">Original Size</div>
                </div>
                <div class="stat-item">
                    <div class="val" id="newSize">-</div>
                    <div class="lbl">Compressed Size</div>
                </div>
                <div class="stat-item">
                    <div class="val" id="savedPct">-</div>
                    <div class="lbl">Saved</div>
                </div>
            </div>

            <button class="btn-primary btn-large" id="processBtn" style="background:#10b981;">Compress PDF</button>
            <p id="statusMsg" style="margin-top:1rem; color:#10b981;"></p>
            <button class="btn-ghost" id="resetBtn" style="margin-top:0.75rem; width:100%;">Upload Another</button>
        </div>
    </div>

    <div class="ad-banner-section bottom-ad">
        
    <div class="ad-container" style="text-align: center; margin: 1rem 0;">
      <ins class="adsbygoogle"
           style="display:inline-block;width:300px;height:250px"
           data-ad-client="ca-pub-7048088905906211"></ins>
      <script>
           (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    </div>

    <script>
        lucide.createIcons();

        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const actionArea = document.getElementById('actionArea');
        const processBtn = document.getElementById('processBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusMsg = document.getElementById('statusMsg');
        const fileInfo = document.getElementById('fileInfo');
        const statsBar = document.getElementById('statsBar');

        let currentPdfBytes = null;
        let fileName = '';
        let originalSize = 0;

        uploadBox.addEventListener('click', () => fileInput.click());
        resetBtn.addEventListener('click', () => location.reload());

        function fmtBytes(b) {
            if (b > 1024 * 1024) return (b / 1024 / 1024).toFixed(2) + ' MB';
            return (b / 1024).toFixed(1) + ' KB';
        }

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            currentPdfBytes = await file.arrayBuffer();
            fileName = file.name;
            originalSize = file.size;
            uploadBox.style.display = 'none';
            actionArea.style.display = 'block';
            fileInfo.innerText = `Selected: ${fileName}  (${fmtBytes(originalSize)})`;
        });

        processBtn.addEventListener('click', async () => {
            try {
                processBtn.disabled = true;
                processBtn.innerText = 'Compressing...';
                statsBar.style.display = 'none';

                const level = document.querySelector('input[name="compLevel"]:checked').value;

                const { PDFDocument } = PDFLib;
                const doc = await PDFDocument.load(currentPdfBytes, { updateMetadata: false });

                if (level === 'normal' || level === 'hard') {
                    doc.setTitle(''); doc.setAuthor(''); doc.setSubject('');
                    doc.setCreator(''); doc.setProducer(''); doc.setKeywords([]);
                }

                const useStreams = (level === 'normal' || level === 'hard');

                const newPdfBytes = await doc.save({ useObjectStreams: useStreams });
                const blob = new Blob([newPdfBytes], { type: 'application/pdf' });
                const newSize = blob.size;

                document.getElementById('origSize').innerText = fmtBytes(originalSize);
                document.getElementById('newSize').innerText = fmtBytes(newSize);

                const saved = ((originalSize - newSize) / originalSize * 100);
                document.getElementById('savedPct').innerText = (saved > 0 ? saved.toFixed(1) + '%' : '0%');
                statsBar.style.display = 'flex';

                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Compressed_${fileName}`;
                link.click();

                statusMsg.innerText = newSize < originalSize
                    ? `Reduced by ${fmtBytes(originalSize - newSize)}. File downloaded!`
                    : 'PDF was already optimized — minimal savings possible.';

                processBtn.innerText = 'Compress Again';
                processBtn.disabled = false;
            } catch (err) {
                console.error(err);
                alert('Failed to compress. See console.');
                processBtn.disabled = false;
                processBtn.innerText = 'Compress PDF';
            }
        });
    </script>
</body>

</html>
