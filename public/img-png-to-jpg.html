<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert PNG to JPG Online | Free Privacy-First Tool | PDFSuite</title>
    <meta name="description" content="Convert PNG images to JPG format instantly. Reduce file size. 100% private.">
    <link rel="stylesheet" href="../src/css/base.css" />
    <link rel="stylesheet" href="../src/css/dashboard.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7048088905906211"
        crossorigin="anonymous"></script>
    <style>
        .workspace {
            max-width: 800px;
            margin: 3rem auto;
            padding: 2rem;
            background: var(--bg-soft);
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
        }

        .upload-zone {
            border: 2px dashed var(--accent);
            border-radius: 14px;
            padding: 3rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-zone:hover,
        .drag-over {
            background: rgba(99, 102, 241, 0.05);
        }

        .action-area {
            display: none;
            text-align: center;
        }

        .btn-convert {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="../index.html" class="logo">PDF<span>Suite</span></a>
            <div class="header-actions"><a href="./image-tools.html" class="btn-ghost btn-small">Image Tools</a></div>
        </div>
    </header>
    <div class="workspace">
        <a href="./image-tools.html"
            style="color:var(--accent); text-decoration:none; display:inline-block; margin-bottom:1rem; font-size:0.9rem;">&larr;
            Back to Image Tools</a>
        <h1>Convert PNG to JPG</h1>
        <p style="color:var(--fg-muted)">Make your PNG images smaller by converting them to JPG. High speed, fully
            private browser conversion.</p>

        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileIn').click()">
            <i data-lucide="image" style="width:48px;height:48px;color:var(--accent);margin:0 auto 1rem;"></i>
            <h3>Select PNG images</h3>
            <p>Or drop them here</p>
            <input type="file" id="fileIn" accept="image/png" multiple hidden>
        </div>

        <div class="action-area" id="actionArea">
            <p id="fileInfo" style="font-weight:600; margin-bottom:1rem;"></p>
            <div
                style="background:var(--bg); padding:1.5rem; border-radius:8px; text-align:left; border:1px solid var(--border-subtle);">
                <label style="font-weight:600; display:block; margin-bottom:0.5rem">JPG Quality</label>
                <input type="range" id="qualitySlider" min="0.1" max="1.0" step="0.1" value="0.9"
                    style="width:100%; accent-color:var(--accent)">
                <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:var(--fg-muted);">
                    <span>Smaller file</span><span>Better quality</span></div>
            </div>
            <button class="btn-convert" id="convertBtn">Convert Files</button>
            <button onclick="location.reload()"
                style="background:transparent; border:none; color:var(--fg-muted); margin-top:1rem; cursor:pointer;">Cancel</button>
        </div>
    </div>
    <script>
        lucide.createIcons();
        const uploadZone = document.getElementById('uploadZone');
        const fileIn = document.getElementById('fileIn');
        const actionArea = document.getElementById('actionArea');
        let filesList = [];

        uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
        uploadZone.addEventListener('drop', e => { e.preventDefault(); handleFiles(e.dataTransfer.files); });
        fileIn.addEventListener('change', e => handleFiles(e.target.files));

        function handleFiles(files) {
            filesList = Array.from(files).filter(f => f.type === 'image/png');
            if (filesList.length === 0) return alert('Please select PNG files only');
            uploadZone.style.display = 'none';
            actionArea.style.display = 'block';
            document.getElementById('fileInfo').innerText = `${filesList.length} PNG file(s) selected`;
        }

        document.getElementById('convertBtn').addEventListener('click', async () => {
            const btn = document.getElementById('convertBtn');
            btn.innerText = 'Converting...';
            btn.disabled = true;
            const q = parseFloat(document.getElementById('qualitySlider').value);

            for (let file of filesList) {
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.src = url;
                await new Promise(r => img.onload = r);

                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = "#ffffff"; // PNG alpha fallback
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);

                canvas.toBlob(blob => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = file.name.replace(/\.png$/i, '') + '.jpg';
                    a.click();
                }, 'image/jpeg', q);
            }
            btn.innerText = 'Done! Check Downloads';
            setTimeout(() => location.reload(), 3000);
        });
    </script>
</body>

</html>
