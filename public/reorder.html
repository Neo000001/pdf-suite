<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organize & Reorder PDF - PDFSuite</title>
    <meta name="description" content="Visually sort, organize, rotate, and delete PDF pages like a pro.">

    <link rel="stylesheet" href="../src/css/base.css" />
    <link rel="stylesheet" href="../src/css/dashboard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7048088905906211"
        crossorigin="anonymous"></script>

    <style>
        .workspace {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 1.5rem;
        }

        .upload-box {
            border: 2px dashed #3b82f6;
            padding: 4rem;
            cursor: pointer;
            border-radius: 12px;
            margin: 2rem auto;
            background: rgba(59, 130, 246, 0.05);
            max-width: 700px;
            text-align: center;
            transition: all 0.2s;
        }

        .upload-box:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: #2563eb;
        }

        .upload-box svg {
            width: 52px;
            height: 52px;
            color: #3b82f6;
            margin-bottom: 1rem;
        }

        .sticky-toolbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg-soft);
            border-bottom: 1px solid var(--border-subtle);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .pages-grid {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            padding-bottom: 4rem;
        }

        .page-thumb-wrapper {
            position: relative;
            background: var(--bg-soft);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s, border-color 0.2s;
            cursor: grab;
        }

        .page-thumb-wrapper.dragging {
            opacity: 0.5;
            cursor: grabbing;
            border-color: var(--accent);
        }

        .page-thumb-wrapper:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
        }

        .page-canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--border-subtle);
            background: #fff;
            pointer-events: none;
        }

        .page-info {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px dashed var(--border-subtle);
        }

        .page-num {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--fg-muted);
        }

        .thumb-actions {
            display: flex;
            gap: 0.25rem;
        }

        .action-icon {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--fg-muted);
            font-size: 0.7rem;
            cursor: pointer;
            padding: 3px 7px;
            border-radius: 4px;
            transition: all 0.15s;
        }

        .action-icon:hover {
            opacity: 1;
            color: var(--fg);
            border-color: var(--accent);
        }

        .action-icon.trash:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        #actionArea {
            display: none;
        }

        @media (max-width: 600px) {
            .pages-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 1rem;
            }

            .sticky-toolbar {
                flex-wrap: wrap;
                gap: 0.5rem;
            }
        }
    </style>
</head>

<body>

    <header class="site-header">
        <div class="header-inner">
            <a href="../index.html" class="logo">PDF<span>Suite</span></a>
            <div class="header-actions"><a href="../index.html" class="btn-ghost btn-small">Back to Tools</a></div>
        </div>
    </header>

    <div class="workspace">
        <div class="upload-box" id="uploadBox">
            <i data-lucide="layout-grid"></i>
            <h2>Visually Organize PDF</h2>
            <p style="color:var(--fg-muted)">Upload a PDF. Drag to reorder, click Rotate or Delete on each page.</p>
            <input type="file" id="fileInput" accept="application/pdf" hidden>
        </div>

        <div id="actionArea">
            <div class="sticky-toolbar">
                <div style="display:flex; align-items:center; gap: 1rem;">
                    <span style="font-weight:600" id="fileTitle">Document</span>
                    <span style="color:var(--fg-muted); font-size:0.9rem;" id="pageCountLabel"></span>
                </div>
                <div style="display:flex; gap:1rem; align-items:center;">
                    <span id="statusMsg" style="font-size:0.9rem; color:#22c55e;"></span>
                    <button class="btn-primary" id="saveBtn">Save Organized PDF</button>
                </div>
            </div>

            <div class="pages-grid" id="pagesGrid"></div>
        </div>
    </div>

    <div class="ad-banner-section bottom-ad">
        <div class="ad-placeholder square"><span>Google Ads - 300x250</span></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        lucide.createIcons();

        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const actionArea = document.getElementById('actionArea');
        const pagesGrid = document.getElementById('pagesGrid');
        const fileTitle = document.getElementById('fileTitle');
        const pageCountLabel = document.getElementById('pageCountLabel');
        const saveBtn = document.getElementById('saveBtn');
        const statusMsg = document.getElementById('statusMsg');

        let originalPdfBytes = null;
        let fileName = '';
        let pagesData = [];

        uploadBox.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileName = file.name;
            originalPdfBytes = await file.arrayBuffer();
            uploadBox.style.display = 'none';
            actionArea.style.display = 'block';
            fileTitle.innerText = fileName;
            statusMsg.innerText = 'Rendering pages...';
            await renderThumbnails();
            statusMsg.innerText = '';
        });

        async function renderThumbnails() {
            pagesGrid.innerHTML = '';
            pagesData = [];

            const doc = await pdfjsLib.getDocument({ data: new Uint8Array(originalPdfBytes) }).promise;
            const numPages = doc.numPages;
            pageCountLabel.innerText = `${numPages} pages`;

            for (let i = 1; i <= numPages; i++) {
                pagesData.push({ id: `page_${i}`, originalIndex: i, rotation: 0, deleted: false });

                const page = await doc.getPage(i);
                const viewport = page.getViewport({ scale: 0.5 });

                const wrapper = document.createElement('div');
                wrapper.className = 'page-thumb-wrapper';
                wrapper.draggable = true;
                wrapper.dataset.index = i - 1;

                const canvas = document.createElement('canvas');
                canvas.className = 'page-canvas';
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

                const infoDiv = document.createElement('div');
                infoDiv.className = 'page-info';

                const numSpan = document.createElement('span');
                numSpan.className = 'page-num';
                numSpan.innerText = i;

                const actDiv = document.createElement('div');
                actDiv.className = 'thumb-actions';

                const rotateBtn = document.createElement('button');
                rotateBtn.className = 'action-icon rotate';
                rotateBtn.innerText = 'Rotate';
                rotateBtn.title = 'Rotate Right 90°';
                rotateBtn.onclick = (ev) => {
                    ev.stopPropagation();
                    const pData = pagesData[wrapper.dataset.index];
                    pData.rotation = (pData.rotation + 90) % 360;
                    canvas.style.transform = `rotate(${pData.rotation}deg)`;
                    canvas.style.transition = 'transform 0.3s';
                };

                const trashBtn = document.createElement('button');
                trashBtn.className = 'action-icon trash';
                trashBtn.innerText = 'Delete';
                trashBtn.title = 'Delete this page';
                trashBtn.onclick = (ev) => {
                    ev.stopPropagation();
                    pagesData[wrapper.dataset.index].deleted = true;
                    wrapper.style.opacity = '0';
                    wrapper.style.transition = 'opacity 0.2s';
                    setTimeout(() => { wrapper.style.display = 'none'; updatePageCount(); }, 200);
                };

                actDiv.appendChild(rotateBtn);
                actDiv.appendChild(trashBtn);
                infoDiv.appendChild(numSpan);
                infoDiv.appendChild(actDiv);
                wrapper.appendChild(canvas);
                wrapper.appendChild(infoDiv);
                setupDragListeners(wrapper);
                pagesGrid.appendChild(wrapper);
            }
        }

        function updatePageCount() {
            const visibleCount = pagesData.filter(p => !p.deleted).length;
            pageCountLabel.innerText = `${visibleCount} pages`;
        }

        let draggedItem = null;

        function setupDragListeners(el) {
            el.addEventListener('dragstart', function () {
                draggedItem = this;
                setTimeout(() => this.classList.add('dragging'), 0);
            });
            el.addEventListener('dragend', function () {
                this.classList.remove('dragging');
                draggedItem = null;
                updateArrayFromDOM();
            });
            el.addEventListener('dragover', (e) => e.preventDefault());
            el.addEventListener('dragenter', (e) => e.preventDefault());
            el.addEventListener('drop', function () {
                if (this !== draggedItem && draggedItem !== null) {
                    const allItems = Array.from(pagesGrid.querySelectorAll('.page-thumb-wrapper'));
                    const draggedIndex = allItems.indexOf(draggedItem);
                    const dropIndex = allItems.indexOf(this);
                    if (draggedIndex < dropIndex) {
                        this.parentNode.insertBefore(draggedItem, this.nextSibling);
                    } else {
                        this.parentNode.insertBefore(draggedItem, this);
                    }
                }
            });
        }

        function updateArrayFromDOM() {
            const elements = Array.from(pagesGrid.querySelectorAll('.page-thumb-wrapper'));
            const newPagesData = [];
            elements.forEach((el, newIdx) => {
                const origIdx = el.dataset.index;
                newPagesData.push(pagesData[origIdx]);
                el.dataset.index = newIdx;
            });
            pagesData = newPagesData;
            let pNum = 1;
            elements.forEach(el => {
                const numEl = el.querySelector('.page-num');
                if (numEl && !pagesData[el.dataset.index].deleted) {
                    numEl.innerText = pNum++;
                }
            });
        }

        saveBtn.addEventListener('click', async () => {
            try {
                saveBtn.disabled = true;
                saveBtn.innerText = 'Processing...';
                statusMsg.innerText = 'Building PDF...';

                const { PDFDocument, degrees } = PDFLib;
                const sourceDoc = await PDFDocument.load(originalPdfBytes);
                const newPdf = await PDFDocument.create();

                const finalPages = pagesData.filter(p => !p.deleted);

                if (finalPages.length === 0) {
                    alert('Cannot save empty document. Restore at least one page.');
                    saveBtn.disabled = false;
                    saveBtn.innerText = 'Save Organized PDF';
                    statusMsg.innerText = '';
                    return;
                }

                const indicesToCopy = finalPages.map(p => p.originalIndex - 1);
                const copiedPages = await newPdf.copyPages(sourceDoc, indicesToCopy);

                finalPages.forEach((pData, i) => {
                    const page = copiedPages[i];
                    const currentRot = page.getRotation().angle;
                    page.setRotation(degrees(currentRot + pData.rotation));
                    newPdf.addPage(page);
                });

                const newPdfBytes = await newPdf.save();
                const blob = new Blob([newPdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Organized_${fileName}`;
                link.click();

                statusMsg.innerText = 'Saved successfully!';
                setTimeout(() => { statusMsg.innerText = ''; }, 3000);
                saveBtn.innerText = 'Save Organized PDF';
                saveBtn.disabled = false;
            } catch (err) {
                console.error(err);
                alert('Failed to save. See console.');
                saveBtn.disabled = false;
                saveBtn.innerText = 'Save Organized PDF';
                statusMsg.innerText = '';
            }
        });
    </script>
</body>

</html>
