        crossorigin="anonymous"></script>
    <style>
        .workspace {
            max-width: 720px;
            margin: 3rem auto;
            padding: 2rem;
            background: var(--bg-soft);
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
            text-align: center;
        }

        .upload-box {
            border: 2px dashed #22c55e;
            padding: 3.5rem 2rem;
            cursor: pointer;
            border-radius: 12px;
            margin-bottom: 2rem;
            background: rgba(34, 197, 94, 0.04);
            transition: all 0.2s;
        }

        .upload-box:hover {
            background: rgba(34, 197, 94, 0.08);
            border-color: #16a34a;
        }

        .upload-box svg {
            width: 48px;
            height: 48px;
            color: #22c55e;
            margin-bottom: 0.75rem;
        }

        #actionArea {
            display: none;
            text-align: left;
        }

        .result-area {
            margin-top: 1.5rem;
            background: var(--bg);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 1rem;
            max-height: 400px;
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        td,
        th {
            border: 1px solid var(--border-subtle);
            padding: 6px 10px;
            text-align: left;
            color: var(--fg);
        }

        th {
            background: rgba(34, 197, 94, 0.1);
            font-weight: 600;
        }
    </style>

    <!-- Auto Theme Detector -->
    <script>
        (function () {
            const savedTheme = localStorage.getItem('pdfsuite-theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else {
                const hour = new Date().getHours();
                const theme = (hour >= 6 && hour < 18) ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();
    </script>
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="../index.html" class="logo">PDF<span>Suite</span></a>
            <div class="header-actions"><a href="../index.html" class="btn-ghost btn-small">Back to Tools</a></div>
        </div>
    </header>
    <div class="ad-banner-section">

        <div class="ad-container" style="text-align: center; margin: 1rem 0;">
            <ins class="adsbygoogle" style="display:inline-block;width:728px;height:90px"
                data-ad-client="ca-pub-7048088905906211"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

    </div>

    <div class="workspace">
        <h1>PDF to Excel</h1>
        <p style="color:var(--fg-muted); margin-bottom:1.5rem;">Extract tables from your PDF and download as a CSV
            spreadsheet you can open in Excel or Google Sheets.</p>

        <div class="upload-box" id="uploadBox">
            <i data-lucide="file-spreadsheet"></i>
            <h2>Select PDF File</h2>
            <p style="color:var(--fg-muted)">Click to upload your PDF</p>
            <input type="file" id="fileInput" accept="application/pdf" hidden>
        </div>

        <div id="actionArea">
            <p id="fileInfo" style="margin-bottom:1rem; font-weight:600;"></p>
            <div id="statusMsg" style="color:var(--fg-muted); margin-bottom:1rem;"></div>
            <div class="result-area" id="resultArea" style="display:none;"></div>
            <div style="display:flex; gap:1rem; margin-top:1.25rem; justify-content:center; flex-wrap:wrap;">
                <button class="btn-primary" id="processBtn" style="background:#22c55e;">Extract & Download CSV</button>
                <button class="btn-ghost" id="resetBtn">Upload Another</button>
            </div>
        </div>
    </div>

    <div class="ad-banner-section bottom-ad">

        <div class="ad-container" style="text-align: center; margin: 1rem 0;">
            <ins class="adsbygoogle" style="display:inline-block;width:300px;height:250px"
                data-ad-client="ca-pub-7048088905906211"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        lucide.createIcons();

        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const actionArea = document.getElementById('actionArea');
        const processBtn = document.getElementById('processBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusMsg = document.getElementById('statusMsg');
        const fileInfo = document.getElementById('fileInfo');
        const resultArea = document.getElementById('resultArea');

        let pdfBytes = null, fileName = '';

        uploadBox.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async e => {
            const file = e.target.files[0];
            if (!file) return;
            fileName = file.name;
            pdfBytes = await file.arrayBuffer();
            uploadBox.style.display = 'none';
            actionArea.style.display = 'block';
            fileInfo.innerText = `Selected: ${fileName}`;
        });

        resetBtn.addEventListener('click', () => { location.reload(); });

        processBtn.addEventListener('click', async () => {
            processBtn.disabled = true;
            processBtn.innerText = 'Extracting...';
            statusMsg.innerText = 'Reading PDF text content...';

            const doc = await pdfjsLib.getDocument({ data: new Uint8Array(pdfBytes) }).promise;
            const allRows = [];

            for (let i = 1; i <= doc.numPages; i++) {
                const page = await doc.getPage(i);
                const content = await page.getTextContent();

                // Group by Y within 8px bands (more precise row alignment)
                const rowMap = {};
                content.items.forEach(item => {
                    const y = Math.round((item.transform[5] || 0) / 8) * 8;
                    if (!rowMap[y]) rowMap[y] = [];
                    rowMap[y].push(item);
                });

                const sortedYs = Object.keys(rowMap).map(Number).sort((a, b) => b - a);

                sortedYs.forEach(y => {
                    const lineItems = rowMap[y].sort((a, b) => (a.transform[4] || 0) - (b.transform[4] || 0));
                    let columns = [];
                    let colStr = "";
                    let lastX = -1;
                    let lastWidth = 0;

                    lineItems.forEach(item => {
                        const x = item.transform[4] || 0;
                        const fontSize = Math.abs(item.transform[3]) || 12;
                        const width = item.width || (item.str.length * (fontSize * 0.5));

                        if (lastX === -1) {
                            // First element, prepend empty cells based on x coordinate if it's very far right
                            // Assume standard left margin is ~50 points, column width ~80 points
                            if (x > 100) {
                                const emptyCells = Math.floor((x - 50) / 80);
                                for (let i = 0; i < emptyCells; i++) columns.push("");
                            }
                            colStr = item.str;
                        } else {
                            // The gap is measured from the END of the last item to the START of the current item.
                            const gap = x - (lastX + lastWidth);

                            // If gap > 15 points, we treat it as a new column
                            if (gap > 15) {
                                columns.push(colStr.trim());
                                colStr = item.str;

                                // Insert extra empty cells if the gap is massive
                                const extraCells = Math.floor(gap / 80);
                                for (let i = 0; i < extraCells - 1; i++) columns.push("");
                            } else {
                                colStr += (colStr.endsWith(" ") ? "" : " ") + item.str;
                            }
                        }
                        lastX = x;
                        lastWidth = width;
                    });

                    if (colStr.trim()) columns.push(colStr.trim());
                    if (columns.length > 0) allRows.push(columns);
                });
            }

            if (allRows.length === 0) {
                statusMsg.innerText = 'No text found in this PDF.';
                processBtn.disabled = false; processBtn.innerText = 'Extract & Download CSV';
                return;
            }

            // Preview table
            let tableHtml = '<table><tbody>';
            allRows.slice(0, 30).forEach(row => {
                tableHtml += '<tr>' + row.map(c => `<td>${c.replace(/</g, '&lt;')}</td>`).join('') + '</tr>';
            });
            tableHtml += '</tbody></table>';
            resultArea.innerHTML = tableHtml;
            resultArea.style.display = 'block';

            // Generate CSV
            const csvContent = "sep=,\n" + allRows.map(row => row.map(cell => `"${cell.replace(/"/g, '""')}"`).join(',')).join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName.replace('.pdf', '') + '_extracted.csv';
            link.click();

            statusMsg.innerText = `Extracted ${allRows.length} rows. Preview shown above.`;
            processBtn.disabled = false;
            processBtn.innerText = 'Extract & Download CSV';
        });
    </script>
    <script src="../src/js/protect.js"></script>
    <script src="../src/js/adblock-detect.js" defer></script>
</body>

</html>
